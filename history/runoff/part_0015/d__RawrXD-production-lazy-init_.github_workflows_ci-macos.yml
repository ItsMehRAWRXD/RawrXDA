name: macOS CI Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'  # 2 AM daily

jobs:
  build-macos:
    strategy:
      matrix:
        os: [macos-12, macos-13, macos-14]
        arch: [x86_64, arm64]
        exclude:
          - os: macos-12
            arch: arm64  # M1 only on newer macOS
          - os: macos-13
            arch: arm64

    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Dependencies
        run: |
          brew install cmake ninja qt6 llvm
          brew link llvm --force

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache Qt6
        uses: actions/cache@v3
        with:
          path: /usr/local/opt/qt6
          key: qt6-${{ matrix.os }}-${{ matrix.arch }}

      - name: Create Build Directory
        run: mkdir -p build

      - name: Configure CMake
        working-directory: build
        env:
          CMAKE_PREFIX_PATH: /usr/local/opt/qt6
          CXXFLAGS: -fPIC
        run: |
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }} \
            -DQt6_DIR=/usr/local/opt/qt6/lib/cmake/Qt6 \
            ..

      - name: Build
        working-directory: build
        run: |
          ninja -j$(sysctl -n hw.ncpu)
          echo "Build completed successfully"

      - name: Run Unit Tests
        working-directory: build
        run: |
          ctest --output-on-failure -j$(sysctl -n hw.ncpu) --timeout 300
          
      - name: Run Integration Tests
        working-directory: build
        run: |
          ctest -R "integration" --output-on-failure -j2 --timeout 600

      - name: Collect Test Metrics
        working-directory: build
        run: |
          echo "=== Test Results ===" > test_results.txt
          ctest --output-on-failure --print-labels >> test_results.txt 2>&1
          cat test_results.txt

      - name: Upload Test Results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.arch }}
          path: build/test_results.txt

      - name: Performance Baseline
        working-directory: build
        run: |
          if command -v performance_test &> /dev/null; then
            performance_test --baseline --output perf_baseline.json
          fi

      - name: Upload Performance Data
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: perf-baseline-${{ matrix.os }}-${{ matrix.arch }}
          path: build/perf_baseline.json

      - name: Create Release Asset (if tag)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd build
          tar -czf ../rawrxd-${{ matrix.os }}-${{ matrix.arch }}.tar.gz bin/
          ls -lh ../rawrxd-${{ matrix.os }}-${{ matrix.arch }}.tar.gz

      - name: Upload Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v3
        with:
          name: release-artifacts-${{ matrix.os }}-${{ matrix.arch }}
          path: rawrxd-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
