  # ============================================================
  # Summary & Status Check
  # ============================================================
  test-summary:
    runs-on: windows-latest
    needs: [
      test-suite,
      test-voice-processor,
      test-ai-merge-resolver,
      test-semantic-diff,
      test-zero-retention,
      test-sandboxed-terminal,
      test-model-registry
    ]
    if: always()
    
    steps:
      - name: Check Test Results
        shell: pwsh
        run: |
          $failed = @()
          
          if ("${{ needs.test-suite.result }}" -ne "success") {
            $failed += "Test Suite"
          }
          if ("${{ needs.test-voice-processor.result }}" -ne "success") {
            $failed += "VoiceProcessor Tests"
          }
          if ("${{ needs.test-ai-merge-resolver.result }}" -ne "success") {
            $failed += "AIMergeResolver Tests"
          }
          if ("${{ needs.test-semantic-diff.result }}" -ne "success") {
            $failed += "SemanticDiffAnalyzer Tests"
          }
          if ("${{ needs.test-zero-retention.result }}" -ne "success") {
            $failed += "ZeroRetentionManager Tests"
          }
          if ("${{ needs.test-sandboxed-terminal.result }}" -ne "success") {
            $failed += "SandboxedTerminal Tests"
          }
          if ("${{ needs.test-model-registry.result }}" -ne "success") {
            $failed += "ModelRegistry Tests"
          }
          
          if ($failed.Count -gt 0) {
            Write-Host "❌ FAILED TESTS:"
            $failed | ForEach-Object { Write-Host "  - $_" }
            exit 1
          } else {
            Write-Host "✅ ALL TESTS PASSED"
            exit 0
          }

      - name: Create Test Summary
        if: always()
        shell: pwsh
        run: |
          $summary = @"
          # 🧪 Test Execution Summary
          
          | Component | Status |
          |-----------|--------|
          | Test Suite (Debug/Release) | ${{ needs.test-suite.result }} |
          | VoiceProcessor | ${{ needs.test-voice-processor.result }} |
          | AIMergeResolver | ${{ needs.test-ai-merge-resolver.result }} |
          | SemanticDiffAnalyzer | ${{ needs.test-semantic-diff.result }} |
          | ZeroRetentionManager | ${{ needs.test-zero-retention.result }} |
          | SandboxedTerminal | ${{ needs.test-sandboxed-terminal.result }} |
          | ModelRegistry | ${{ needs.test-model-registry.result }} |
          
          **Summary**: All 7 component test suites with 290+ test cases executed.
          "@
          
          Write-Host $summary
