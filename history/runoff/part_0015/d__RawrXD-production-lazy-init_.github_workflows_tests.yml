          $QtBase = Join-Path $PWD "Qt\6.7.3\msvc2019_64"
          echo "Qt6_DIR=$QtBase" >> $env:GITHUB_ENV
          echo "$($QtBase)\bin" >> $env:GITHUB_PATH

      - name: Build VoiceProcessor Tests
        shell: pwsh
        run: |
          mkdir build_voice -Force
          cd build_voice
          cmake -DCMAKE_BUILD_TYPE=Release -G "Visual Studio 17 2022" -A x64 ..
          cmake --build . --config Release --target voice_processor_test -j4
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Run VoiceProcessor Tests
        shell: pwsh
        run: |
          cd build_voice
          .\bin\Release\voice_processor_test.exe --gtest_shuffle
          if ($LASTEXITCODE -ne 0) { exit 1 }

