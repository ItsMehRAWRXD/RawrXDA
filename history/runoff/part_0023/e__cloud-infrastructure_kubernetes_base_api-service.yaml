apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: production
  labels:
    app: api-server
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: LoadBalancer
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: https
      port: 443
      targetPort: 8443
      protocol: TCP
    - name: grpc
      port: 50051
      targetPort: 50051
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
  selector:
    app: api-server
    tier: backend
---
apiVersion: v1
kind: Service
metadata:
  name: api-service-internal
  namespace: production
  labels:
    app: api-server
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: grpc
      port: 50051
      targetPort: 50051
      protocol: TCP
  selector:
    app: api-server
    tier: backend
---
apiVersion: v1
kind: Service
metadata:
  name: api-stateful
  namespace: production
spec:
  clusterIP: None
  selector:
    app: api-stateful
  ports:
    - port: 8080
      targetPort: 8080
      name: http
