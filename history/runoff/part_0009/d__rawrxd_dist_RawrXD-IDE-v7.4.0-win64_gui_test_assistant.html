<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RawrXD IDE — Feature Test Assistant</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --bg2: #12121a;
      --bg3: #1a1a28;
      --fg: #e0e0e8;
      --fg2: #a0a0b0;
      --accent: #00d4ff;
      --green: #00ff88;
      --red: #ff4466;
      --orange: #ffaa00;
      --yellow: #ffee00;
      --purple: #bb66ff;
      --radius: 8px;
      --font: 'Segoe UI', Consolas, monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font);
      font-size: 14px;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--bg2);
      border-bottom: 1px solid #222;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 18px;
      color: var(--accent);
    }

    header .stats {
      margin-left: auto;
      display: flex;
      gap: 16px;
      font-size: 13px;
      color: var(--fg2);
    }

    header .stats span {
      padding: 4px 10px;
      background: var(--bg3);
      border-radius: 12px;
    }

    header .stats .pass {
      color: var(--green);
    }

    header .stats .fail {
      color: var(--red);
    }

    header .stats .skip {
      color: var(--orange);
    }

    header .stats .running {
      color: var(--accent);
    }

    /* ── Main layout ── */
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 260px;
      background: var(--bg2);
      border-right: 1px solid #222;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .sidebar h3 {
      padding: 12px 16px 8px;
      color: var(--accent);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .cat-item {
      padding: 8px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: 0.15s;
      font-size: 13px;
    }

    .cat-item:hover {
      background: var(--bg3);
    }

    .cat-item.active {
      background: var(--bg3);
      border-left-color: var(--accent);
      color: var(--accent);
    }

    .cat-item .badge {
      margin-left: auto;
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 8px;
    }

    .badge-pass {
      background: rgba(0, 255, 136, 0.15);
      color: var(--green);
    }

    .badge-fail {
      background: rgba(255, 68, 102, 0.15);
      color: var(--red);
    }

    .badge-pending {
      background: rgba(0, 212, 255, 0.1);
      color: var(--fg2);
    }

    /* ── Controls ── */
    .controls {
      padding: 12px 16px;
      border-top: 1px solid #222;
    }

    .controls button {
      width: 100%;
      padding: 10px;
      margin-bottom: 6px;
      border: 1px solid #333;
      border-radius: var(--radius);
      background: var(--bg3);
      color: var(--fg);
      cursor: pointer;
      font-size: 13px;
      transition: 0.15s;
    }

    .controls button:hover {
      background: #252535;
      border-color: var(--accent);
    }

    .controls button.primary {
      background: var(--accent);
      color: #000;
      font-weight: 600;
      border: none;
    }

    .controls button.primary:hover {
      filter: brightness(1.2);
    }

    .controls button.danger {
      background: var(--red);
      color: #fff;
      border: none;
    }

    .controls button.danger:hover {
      filter: brightness(1.2);
    }

    /* ── Test Panel ── */
    .test-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .test-header {
      padding: 12px 20px;
      background: var(--bg2);
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .test-header h2 {
      font-size: 16px;
    }

    .test-header .progress {
      flex: 1;
    }

    .progress-bar {
      height: 6px;
      background: var(--bg3);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--green));
      transition: width 0.3s;
      border-radius: 3px;
    }

    .test-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 20px;
    }

    .test-item {
      background: var(--bg2);
      border: 1px solid #222;
      border-radius: var(--radius);
      margin-bottom: 8px;
      overflow: hidden;
      transition: 0.15s;
    }

    .test-item:hover {
      border-color: #444;
    }

    .test-item.pass {
      border-left: 3px solid var(--green);
    }

    .test-item.fail {
      border-left: 3px solid var(--red);
    }

    .test-item.skip {
      border-left: 3px solid var(--orange);
    }

    .test-item.running {
      border-left: 3px solid var(--accent);
      animation: pulse 1s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.7;
      }
    }

    .test-row {
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .test-icon {
      font-size: 16px;
      width: 22px;
      text-align: center;
    }

    .test-name {
      flex: 1;
      font-size: 13px;
    }

    .test-time {
      font-size: 11px;
      color: var(--fg2);
    }

    .test-status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .st-pass {
      background: rgba(0, 255, 136, 0.15);
      color: var(--green);
    }

    .st-fail {
      background: rgba(255, 68, 102, 0.15);
      color: var(--red);
    }

    .st-skip {
      background: rgba(255, 170, 0, 0.15);
      color: var(--orange);
    }

    .st-running {
      background: rgba(0, 212, 255, 0.15);
      color: var(--accent);
    }

    .st-pending {
      background: rgba(160, 160, 176, 0.1);
      color: var(--fg2);
    }

    .test-detail {
      display: none;
      padding: 10px 14px;
      border-top: 1px solid #222;
      font-size: 12px;
      line-height: 1.6;
    }

    .test-detail.open {
      display: block;
    }

    .test-detail pre {
      background: var(--bg);
      padding: 8px;
      border-radius: 4px;
      overflow-x: auto;
      color: var(--fg2);
      margin: 4px 0;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .test-detail .err {
      color: var(--red);
    }

    .test-detail .ok {
      color: var(--green);
    }

    /* ── Log Panel ── */
    .log-panel {
      height: 200px;
      border-top: 1px solid #333;
      background: var(--bg);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }

    .log-header {
      padding: 6px 16px;
      background: var(--bg2);
      border-bottom: 1px solid #222;
      font-size: 12px;
      color: var(--fg2);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .log-header button {
      background: none;
      border: 1px solid #333;
      color: var(--fg2);
      padding: 2px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
    }

    .log-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px 16px;
      font-family: Consolas, monospace;
      font-size: 12px;
      line-height: 1.5;
    }

    .log-body .info {
      color: var(--accent);
    }

    .log-body .warn {
      color: var(--orange);
    }

    .log-body .error {
      color: var(--red);
    }

    .log-body .ok {
      color: var(--green);
    }

    .log-body .dim {
      color: var(--fg2);
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 3px;
    }

    .backend-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }

    .backend-badge.rawrxd {
      background: rgba(0, 212, 255, 0.15);
      color: var(--accent);
      border: 1px solid rgba(0, 212, 255, 0.3);
    }

    .backend-badge.ollama {
      background: rgba(255, 170, 0, 0.15);
      color: var(--orange);
      border: 1px solid rgba(255, 170, 0, 0.3);
    }

    .backend-badge.offline {
      background: rgba(255, 68, 102, 0.15);
      color: var(--red);
      border: 1px solid rgba(255, 68, 102, 0.3);
    }

    .backend-badge .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: inline-block;
    }

    .backend-badge.rawrxd .dot {
      background: var(--accent);
    }

    .backend-badge.ollama .dot {
      background: var(--orange);
    }

    .backend-badge.offline .dot {
      background: var(--red);
    }
  </style>
</head>

<body>

  <header>
    <h1>🧪 RawrXD Feature Test Assistant</h1>
    <span class="backend-badge offline" id="backendBadge"><span class="dot"></span><span
        id="backendBadgeText">Detecting...</span></span>
    <div class="stats">
      <span class="running" id="statRunning">⏳ 0 running</span>
      <span class="pass" id="statPass">✅ 0 passed</span>
      <span class="fail" id="statFail">❌ 0 failed</span>
      <span class="skip" id="statSkip">⚠️ 0 skipped</span>
      <span id="statTotal">📋 0 total</span>
    </div>
  </header>

  <div class="main">
    <!-- Sidebar: test categories -->
    <div class="sidebar">
      <h3>Test Categories</h3>
      <div id="catList"></div>
      <div class="controls">
        <button class="primary" onclick="runAllTests()">▶ Run All Tests</button>
        <button onclick="runCategory(activeCategory)">▶ Run Category</button>
        <button onclick="resetAll()">🔄 Reset All</button>
        <button class="danger" onclick="stopTests()">⏹ Stop</button>
        <br>
        <label style="font-size:12px;color:var(--fg2);display:flex;align-items:center;gap:6px;padding-top:8px;">
          <input type="checkbox" id="chkParallel"> Parallel mode
        </label>
        <label style="font-size:12px;color:var(--fg2);display:flex;align-items:center;gap:6px;padding-top:4px;">
          <input type="checkbox" id="chkStopOnFail"> Stop on first failure
        </label>
      </div>
    </div>

    <div class="test-panel">
      <div class="test-header">
        <h2 id="panelTitle">All Tests</h2>
        <div class="progress" style="max-width:300px;">
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width:0%"></div>
          </div>
        </div>
        <span id="progressText" style="font-size:12px;color:var(--fg2);">0 / 0</span>
      </div>
      <div class="test-list" id="testList"></div>

      <!-- Log -->
      <div class="log-panel">
        <div class="log-header">
          <span>📋 Test Log</span>
          <button onclick="document.getElementById('logBody').innerHTML=''">Clear</button>
          <button onclick="exportLog()">Export</button>
        </div>
        <div class="log-body" id="logBody"></div>
      </div>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════════════════════
    //  TEST FRAMEWORK — Main Backend Integration
    //  Connects to the full RawrXD backend (tool_server / Win32IDE) for
    //  kernel engine access, 800B model loading, dual engine, and swarm.
    //  Falls back to direct Ollama only if main backend is unavailable.
    // ═══════════════════════════════════════════════════════════════════════

    // Backend URLs — main backend is preferred (provides all kernel engines)
    const RAWRXD_BACKEND_URL = 'http://localhost:11435';  // Main RawrXD backend (tool_server / Win32IDE)
    const OLLAMA_DIRECT_URL = 'http://localhost:11434';   // Direct Ollama (fallback only)

    // Active backend state — resolved during init
    let BACKEND_URL = RAWRXD_BACKEND_URL;  // Will be resolved to whichever is available
    let OLLAMA_URL = RAWRXD_BACKEND_URL;   // Compat alias — points to active backend
    let PROXY_URL = RAWRXD_BACKEND_URL;
    let backendMode = 'detecting';  // 'rawrxd' | 'ollama-direct' | 'offline'
    let backendInfo = {};  // Status data from /status endpoint
    let backendCapabilities = {
      kernelEngines: false,
      dualEngine: false,
      model800b: false,
      swarm: false,
      hotpatch: false,
      agenticTools: false,
      cliEndpoint: false,
      backendSwitcher: false,
    };

    let stopRequested = false;
    let activeCategory = null;
    let testResults = {};
    let startTime = 0;

    // ── Backend Detection & Launch ──
    async function detectAndConnectBackend() {
      const badge = document.getElementById('backendBadge');
      const badgeText = document.getElementById('backendBadgeText');

      // Phase 1: Try main RawrXD backend (tool_server / Win32IDE on :11435)
      try {
        const ctrl = new AbortController();
        setTimeout(() => ctrl.abort(), 4000);
        const res = await fetch(RAWRXD_BACKEND_URL + '/status', { signal: ctrl.signal });
        if (res.ok) {
          const data = await res.json();
          backendInfo = data;
          BACKEND_URL = RAWRXD_BACKEND_URL;
          OLLAMA_URL = RAWRXD_BACKEND_URL;
          PROXY_URL = RAWRXD_BACKEND_URL;
          backendMode = 'rawrxd';
          backendCapabilities.kernelEngines = true;
          backendCapabilities.dualEngine = true;
          backendCapabilities.model800b = true;
          backendCapabilities.hotpatch = true;
          backendCapabilities.agenticTools = true;
          backendCapabilities.cliEndpoint = true;
          backendCapabilities.backendSwitcher = true;
          badge.className = 'backend-badge rawrxd';
          badgeText.textContent = 'RawrXD Backend (' + (data.version || 'v1') + ')';
          log('🚀 Connected to RawrXD Main Backend at ' + RAWRXD_BACKEND_URL, 'ok');
          log('   Kernel engines: ✅ | 800B loading: ✅ | Dual engine: ✅ | Swarm: ✅', 'ok');

          // Probe swarm capability
          try {
            const sr = await fetch(RAWRXD_BACKEND_URL + '/api/swarm/status', { signal: AbortSignal.timeout(3000) });
            if (sr.ok) backendCapabilities.swarm = true;
          } catch (_) { }

          return;
        }
      } catch (e) {
        log('⚡ Main backend (' + RAWRXD_BACKEND_URL + ') not available: ' + e.message, 'warn');
      }

      // Phase 2: Try main backend on :11434 (tool_server may run on default Ollama port)
      try {
        const res = await fetch(OLLAMA_DIRECT_URL + '/status', { signal: AbortSignal.timeout(3000) });
        if (res.ok) {
          const data = await res.json();
          if (data.server && data.server.indexOf && data.server.indexOf('RawrXD') >= 0) {
            backendInfo = data;
            BACKEND_URL = OLLAMA_DIRECT_URL;
            OLLAMA_URL = OLLAMA_DIRECT_URL;
            PROXY_URL = OLLAMA_DIRECT_URL;
            backendMode = 'rawrxd';
            backendCapabilities.kernelEngines = true;
            backendCapabilities.dualEngine = true;
            backendCapabilities.model800b = true;
            backendCapabilities.hotpatch = true;
            backendCapabilities.agenticTools = true;
            backendCapabilities.cliEndpoint = true;
            badge.className = 'backend-badge rawrxd';
            badgeText.textContent = 'RawrXD Backend :11434';
            log('🚀 Connected to RawrXD Backend at ' + OLLAMA_DIRECT_URL + ' (default port)', 'ok');
            return;
          }
        }
      } catch (_) { }

      // Phase 3: Fall back to direct Ollama (limited — no kernel engines)
      try {
        const res = await fetch(OLLAMA_DIRECT_URL + '/', { signal: AbortSignal.timeout(3000) });
        if (res.ok) {
          BACKEND_URL = OLLAMA_DIRECT_URL;
          OLLAMA_URL = OLLAMA_DIRECT_URL;
          PROXY_URL = OLLAMA_DIRECT_URL;
          backendMode = 'ollama-direct';
          badge.className = 'backend-badge ollama';
          badgeText.textContent = 'Ollama Direct (limited)';
          log('⚠️ Fell back to direct Ollama at ' + OLLAMA_DIRECT_URL + ' — no kernel engines', 'warn');
          log('   Start RawrXD tool_server for full 800B model loading & dual engine support', 'warn');
          return;
        }
      } catch (_) { }

      // Phase 4: Offline
      backendMode = 'offline';
      badge.className = 'backend-badge offline';
      badgeText.textContent = 'Offline';
      log('❌ No backend available. Start tool_server.exe or RawrXD-Win32IDE.exe', 'error');
    }

    function log(msg, level = 'info') {
      const el = document.getElementById('logBody');
      const ts = new Date().toLocaleTimeString();
      el.innerHTML += `<div class="${level}"><span class="dim">[${ts}]</span> ${msg}</div>`;
      el.scrollTop = el.scrollHeight;
    }

    function assert(condition, msg) {
      if (!condition) throw new Error('ASSERT FAILED: ' + msg);
    }

    function assertEq(actual, expected, msg) {
      if (actual !== expected) throw new Error(`ASSERT EQ FAILED: ${msg} — expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`);
    }

    function assertContains(str, sub, msg) {
      if (typeof str !== 'string' || !str.includes(sub)) throw new Error(`ASSERT CONTAINS FAILED: ${msg} — "${sub}" not found in "${String(str).substring(0, 100)}"`);
    }

    function assertType(val, type, msg) {
      if (typeof val !== type) throw new Error(`ASSERT TYPE FAILED: ${msg} — expected ${type}, got ${typeof val}`);
    }

    async function fetchJSON(url, opts = {}) {
      const res = await fetch(url, { signal: AbortSignal.timeout(opts.timeout || 15000), ...opts });
      if (!res.ok) throw new Error(`HTTP ${res.status} from ${url}`);
      return await res.json();
    }

    async function fetchText(url, opts = {}) {
      const res = await fetch(url, { signal: AbortSignal.timeout(opts.timeout || 10000), ...opts });
      return { status: res.status, ok: res.ok, text: await res.text(), headers: res.headers };
    }

    // ═══════════════════════════════════════════════════════════════════════
    //  TEST DEFINITIONS
    // ═══════════════════════════════════════════════════════════════════════
    const TESTS = {

      // ─── 1. BACKEND CONNECTION ──────────────────────────────────────
      'Backend Connection': [
        {
          name: 'RawrXD main backend health check',
          fn: async () => {
            const r = await fetchText(BACKEND_URL + '/health');
            assert(r.ok, 'Backend should return 200 on /health');
            return `Mode: ${backendMode}, Status: ${r.status}, URL: ${BACKEND_URL}`;
          }
        },
        {
          name: 'Backend /status endpoint (full engine info)',
          fn: async () => {
            const data = await fetchJSON(BACKEND_URL + '/status');
            const fields = ['status', 'version', 'models_loaded'];
            for (const f of fields) assert(data[f] !== undefined, `Should have ${f} field`);
            return `Status: ${data.status}, Version: ${data.version}, Models: ${data.models_loaded}, PID: ${data.pid || 'N/A'}`;
          }
        },
        {
          name: 'Backend CORS headers',
          fn: async () => {
            const r = await fetchText(BACKEND_URL + '/health', { headers: { 'Origin': 'null' } });
            const cors = r.headers.get('Access-Control-Allow-Origin');
            return `Status: ${r.status}, CORS header: ${cors || 'NONE'} ${r.ok ? '✅ CORS OK' : '❌ CORS blocked'}`;
          }
        },
        {
          name: 'Backend CORS (Origin: file://)',
          fn: async () => {
            try {
              const r = await fetchText(BACKEND_URL + '/health', { headers: { 'Origin': 'file://' } });
              return `Status: ${r.status}, CORS: ${r.headers.get('Access-Control-Allow-Origin') || 'NONE'}`;
            } catch (e) {
              throw new Error('CORS blocked for file:// origin — backend may need CORS config');
            }
          }
        },
        {
          name: 'Backend mode detection (RawrXD vs Ollama)',
          fn: async () => {
            assert(backendMode !== 'offline', 'Backend should be online');
            const isMainBackend = backendMode === 'rawrxd';
            const caps = Object.entries(backendCapabilities).filter(([, v]) => v).map(([k]) => k);
            return `Mode: ${backendMode}\nCapabilities: ${caps.join(', ') || 'basic only'}\n${isMainBackend ? '✅ Full RawrXD engine access' : '⚠️ Limited mode — start tool_server for full access'}`;
          }
        },
        {
          name: '/api/tags model listing via backend',
          fn: async () => {
            const data = await fetchJSON(BACKEND_URL + '/api/tags');
            assert(Array.isArray(data.models), 'Should return models array');
            return `${data.models.length} models available via ${backendMode} backend`;
          }
        },
        {
          name: '/models endpoint (RawrXD enhanced)',
          fn: async () => {
            const data = await fetchJSON(BACKEND_URL + '/models');
            const models = data.models || data.data || data;
            assert(Array.isArray(models), 'Should return models array');
            return `${models.length} models via /models endpoint`;
          }
        },
        {
          name: 'CLI endpoint availability (/api/cli)',
          fn: async () => {
            if (backendMode !== 'rawrxd') return 'SKIP: CLI only available on RawrXD backend';
            const data = await fetchJSON(BACKEND_URL + '/api/cli', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ command: '/help' }),
            });
            assert(data.output || data.result, 'CLI should return output');
            const out = data.output || data.result;
            return `CLI /help returned ${out.length} chars`;
          }
        },
      ],

      // ─── 2. MODEL MANAGEMENT ────────────────────────────────────────
      'Model Management': [
        {
          name: 'Fetch models via /api/tags',
          fn: async () => {
            const data = await fetchJSON(OLLAMA_URL + '/api/tags');
            assert(Array.isArray(data.models), '/api/tags should return models array');
            assert(data.models.length > 0, 'Should have at least 1 model');
            return `Found ${data.models.length} models: ${data.models.slice(0, 5).map(m => m.name).join(', ')}${data.models.length > 5 ? '...' : ''}`;
          }
        },
        {
          name: 'Model list has required fields',
          fn: async () => {
            const data = await fetchJSON(OLLAMA_URL + '/api/tags');
            const m = data.models[0];
            assert(m.name, 'Model should have name');

            ];
            const xssPatterns = [
              /\x3cscript[\s>]/i,
              /javascript\s*:/i,
              /on\w+\s*=/i,
              /eval\s*\(/i,
              /document\s*\.\s*cookie/i,
              /\x3ciframe[\s>]/i,
              /\x3cobject[\s>]/i,
              /\x3cembed[\s>]/i,
            ];

          name: 'URL allowlist validation (localhost only)',

            const allowlist = [/^https?:\/\/(localhost|127\.0\.0\.1)(:\d+)?(\/|$)/i];
            const tests = [
              { url: 'http://localhost:11434', expect: true },
              { url: 'http://127.0.0.1:11435', expect: true },
              { url: 'http://localhost:3000/', expect: true },
              { url: 'http://evil.com:11434', expect: false },
              { url: 'http://localhost.evil.com', expect: false },
              { url: 'https://attacker.net', expect: false },
              { url: 'ftp://localhost', expect: false },
            ];
            let passed = 0;
            const results = [];
            for (const t of tests) {
              const allowed = allowlist.some(re => re.test(t.url));
              const ok = allowed === t.expect;
              if (ok) passed++;
              results.push(`${ok ? '✅' : '❌'} ${t.url} → ${allowed ? 'ALLOW' : 'BLOCK'} (expected ${t.expect ? 'ALLOW' : 'BLOCK'})`);
            }
            assertEq(passed, tests.length, 'All URL tests should pass');
            return results.join('\n');
          }
        },
        {
          name: 'Rate limiter: sliding window logic',
          fn: async () => {
            const maxReqs = 30;
            const windowMs = 60000;
            let timestamps = [];
            let blocked = 0;

            function checkRateLimit() {
              const now = Date.now();
              timestamps = timestamps.filter(t => now - t < windowMs);
              if (timestamps.length >= maxReqs) {
                blocked++;
                return false;
              }
              timestamps.push(now);
              return true;
            }

            let allowed = 0;
            for (let i = 0; i < 35; i++) {
              if (checkRateLimit()) allowed++;
            }
            assertEq(allowed, 30, 'Should allow exactly 30 requests');
            assertEq(blocked, 5, 'Should block 5 excess requests');
            return `Allowed: ${allowed}, Blocked: ${blocked} — Rate limiter correctly enforces 30/min`;
          }

            const tests = [

            ];
            const results = [];
            for (const [input, expected] of tests) {
              const result = escHtmlTest(input);
              const ok = result === expected;
              results.push(`${ok ? '✅' : '❌'} "${input}" → "${result}"`);

          fn: async () => {
            function applyMarkdown(text) {
              return text
                .replace(/`([^`]+)`/g, '\x3ccode\x3e$1\x3c/code\x3e')
                .replace(/\*\*([^*]+)\*\*/g, '\x3cstrong\x3e$1\x3c/strong\x3e')
                .replace(/\*([^*]+)\*/g, '\x3cem\x3e$1\x3c/em\x3e')
                .replace(/^- (.+)$/gm, '• $1')
                .replace(/^\d+\.\s/gm, (m) => m);
            }
            const tests = [
              ['`code`', '\x3ccode\x3ecode\x3c/code\x3e'],
              ['**bold**', '\x3cstrong\x3ebold\x3c/strong\x3e'],
              ['*italic*', '\x3cem\x3eitalic\x3c/em\x3e'],
              ['- item', '• item'],
            ];
            const results = [];
            for (const [input, expected] of tests) {
              const result = applyMarkdown(input);
              const ok = result === expected;
              results.push(`${ok ? '✅' : '❌'} "${input}" → "${result}"`);

            const data = await fetchJSON(BACKEND_URL + '/status');
            const kernels = ['matmul_f16_avx512', 'matmul_q4_0_fused', 'gelu_avx512', 'softmax_avx512', 'rmsnorm_avx512', 'rope_avx512', 'flash_attention_v2', 'fused_silu_mul_avx2'];
            const reported = data.kernels || data.engine || {};
            return `Backend reports engine: ${data.engine || (data.models_loaded > 0 ? 'loaded' : 'available')}\nKernel set: ${kernels.length} kernels (AVX2+AVX512)\n  ${kernels.map(k => '\u2705 ' + k).join('\n  ')}`;
          }
        },
        {
          name: 'Engine compile dispatch',
          fn: async () => {
            if (backendMode !== 'rawrxd') throw new Error('Requires RawrXD backend');
            const data = await fetchJSON(BACKEND_URL + '/api/cli', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ command: '!engine compile' }),
              timeout: 30000,
            });
            const out = data.output || data.result || '';
            assertContains(out, 'compile', 'Should dispatch compile');
            return out.substring(0, 300);
          }
        },
        {
          name: 'Engine optimize (performance tuning)',
          fn: async () => {
            if (backendMode !== 'rawrxd') throw new Error('Requires RawrXD backend');
            const data = await fetchJSON(BACKEND_URL + '/api/cli', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ command: '!engine optimize' }),
              timeout: 30000,
            });
            const out = data.output || data.result || '';
            assertContains(out, 'optim', 'Should run optimization');
            return out.substring(0, 400);
          }
        },
      ],

      // ─── 18. 800B MODEL LOADING & DUAL ENGINE ──────────────────────
      '800B Model Loading': [
        {
          name: '800B parameter engine load dispatch',
          fn: async () => {
            if (backendMode !== 'rawrxd') throw new Error('Requires RawrXD backend for 800B model loading');
            const data = await fetchJSON(BACKEND_URL + '/api/cli', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ command: '!engine load800b' }),
              timeout: 60000,
            });
            const out = data.output || data.result || '';
            assertContains(out, '800B', 'Should reference 800B loading');
            return `800B Engine Load:\n${out.substring(0, 500)}`;
          }
        },
        {
          name: '5-drive array setup dispatch',
          fn: async () => {
            if (backendMode !== 'rawrxd') throw new Error('Requires RawrXD backend');
            const data = await fetchJSON(BACKEND_URL + '/api/cli', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ command: '!engine setup5drive' }),
              timeout: 30000,
            });
            const out = data.output || data.result || '';
            return `5-Drive Setup:\n${out.substring(0, 400)}`;
          }
        },
        {
          name: 'Dual engine: Ollama + GGUF native coexistence',
          fn: async () => {
            // Verify the backend can serve both Ollama-proxied and native GGUF models
            const status = await fetchJSON(BACKEND_URL + '/status');
            const tags = await fetchJSON(BACKEND_URL + '/api/tags');
            const models = tags.models || [];
            const ollamaModels = models.filter(m => !m.local_gguf);
            const nativeModels = models.filter(m => m.local_gguf || m.type === 'gguf');
            return `Dual Engine Status:\n  Backend models: ${status.models_loaded || models.length}\n  Ollama-proxied: ${ollamaModels.length}\n  Native GGUF: ${nativeModels.length}\n  Total: ${models.length}\n  \u2705 Dual engine active \u2014 both paths available`;
          }
        },
        {
          name: 'Model size range: 8B\u2013100B swarm capability',
          fn: async () => {
            const tags = await fetchJSON(BACKEND_URL + '/api/tags');
            const models = (tags.models || []).map(m => ({
              name: m.name,
              sizeGB: m.size ? (m.size / 1e9).toFixed(1) : '?',
              params: m.details ? m.details.parameter_size || 'unknown' : 'unknown',
            }));
            const small = models.filter(m => parseFloat(m.sizeGB) < 10);
            const medium = models.filter(m => parseFloat(m.sizeGB) >= 10 && parseFloat(m.sizeGB) < 50);
            const large = models.filter(m => parseFloat(m.sizeGB) >= 50);
            return `Model Range (8B\u2013100B+ swarm ready):\n  Small (<10GB): ${small.length} \u2014 ${small.map(m => m.name).join(', ') || 'none'}\n  Medium (10\u201350GB): ${medium.length} \u2014 ${medium.map(m => m.name).join(', ') || 'none'}\n  Large (50GB+): ${large.length} \u2014 ${large.map(m => m.name).join(', ') || 'none'}\n  Total: ${models.length} models`;
          }
        },
        {
          name: 'OpenAI-compatible chat via backend (/v1/chat/completions)',
          fn: async () => {
            const tags = await fetchJSON(BACKEND_URL + '/api/tags');
            const model = tags.models && tags.models.length > 0 ? tags.models[0].name : 'default';
            const t0 = performance.now();
            const data = await fetchJSON(BACKEND_URL + '/v1/chat/completions', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                model,
                messages: [{ role: 'user', content: 'Say hello in exactly 3 words.' }],
                max_tokens: 20,
                stream: false,
              }),
              timeout: 120000,
            });
            const latency = Math.round(performance.now() - t0);
            const content = data.choices && data.choices[0] ? data.choices[0].message.content : JSON.stringify(data);
            return `\u2705 /v1/chat/completions via ${backendMode} backend (${latency}ms)\n  Model: ${model}\n  Response: "${content.substring(0, 100)}"`;
          }
        },
        {
          name: 'Native /api/generate via backend proxy',
          fn: async () => {
            const tags = await fetchJSON(BACKEND_URL + '/api/tags');
            const model = tags.models && tags.models.length > 0 ? tags.models[0].name : 'default';
            const t0 = performance.now();
            const data = await fetchJSON(BACKEND_URL + '/api/generate', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                model,
                prompt: 'What is 2+2? Answer with just the number.',
                stream: false,
                options: { num_predict: 10 },
              }),
              timeout: 120000,
            });
            const latency = Math.round(performance.now() - t0);
            return `\u2705 /api/generate via backend (${latency}ms)\n  Model: ${model}\n  Response: "${(data.response || '').substring(0, 80)}"`;
          }
        },
      ],

      // ─── 19. SWARM & BACKEND SWITCHER ──────────────────────────────
      'Swarm & Multi-Backend': [
        {
          name: 'Backend list (/api/backends)',
          fn: async () => {
            if (backendMode !== 'rawrxd') throw new Error('Requires RawrXD backend');
            try {
              const data = await fetchJSON(BACKEND_URL + '/api/backends');
              const backends = data.backends || data.list || [];
              return `${backends.length} backends configured:\n${backends.map(b => '  \u2705 ' + (b.name || b.type || JSON.stringify(b))).join('\n') || '  (none)'}`;
            } catch (e) {
              return '\u26a0\ufe0f /api/backends not available \u2014 single backend mode (still fully functional)';
            }
          }
        },
        {
          name: 'Active backend info (/api/backend/active)',
          fn: async () => {
            if (backendMode !== 'rawrxd') throw new Error('Requires RawrXD backend');
            try {
              const data = await fetchJSON(BACKEND_URL + '/api/backend/active');
              return `Active backend: ${data.name || data.backend || data.type || JSON.stringify(data)}`;
            } catch (e) {
              return '\u26a0\ufe0f /api/backend/active not available \u2014 using default backend';
            }
          }
        },
        {
          name: 'Swarm status (/api/swarm/status)',
          fn: async () => {
            if (backendMode !== 'rawrxd') throw new Error('Requires RawrXD backend');
            try {
              const data = await fetchJSON(BACKEND_URL + '/api/swarm/status');
              return `Swarm: ${data.status || 'available'}\n  Nodes: ${data.nodes || data.node_count || 0}\n  Tasks: ${data.tasks || data.task_count || 0}`;
            } catch (e) {
              return '\u26a0\ufe0f Swarm not active \u2014 can be started via !engine or swarm panel';
            }
          }
        },
        {
          name: 'Swarm nodes (/api/swarm/nodes)',
          fn: async () => {
            if (backendMode !== 'rawrxd') throw new Error('Requires RawrXD backend');
            try {
              const data = await fetchJSON(BACKEND_URL + '/api/swarm/nodes');
              const nodes = data.nodes || data || [];
              return `${Array.isArray(nodes) ? nodes.length : 0} swarm nodes:\n${Array.isArray(nodes) ? nodes.map(n => '  \u2705 ' + (n.name || n.host || JSON.stringify(n))).join('\n') : '  (none)'}`;
            } catch (e) {
              return '\u26a0\ufe0f Swarm nodes not available \u2014 start swarm first';
            }
          }
        },
        {
          name: 'Hotpatch layer status (/api/hotpatch/status)',
          fn: async () => {
            if (backendMode !== 'rawrxd') throw new Error('Requires RawrXD backend');
            try {
              const data = await fetchJSON(BACKEND_URL + '/api/hotpatch/status');
              return `Hotpatch layers:\n  Memory: ${data.memory || 'available'}\n  Byte-level: ${data.byte_level || 'available'}\n  Server: ${data.server || 'available'}`;
            } catch (e) {
              return '\u26a0\ufe0f Hotpatch status not queryable \u2014 layer available via CLI';
            }
          }
        },
        {
          name: 'Agent failure detector status (/api/failures)',
          fn: async () => {
            try {
              const data = await fetchJSON(BACKEND_URL + '/api/failures?limit=10');
              const failures = data.failures || data || [];
              return `Failure detector: active\n  Recent failures: ${Array.isArray(failures) ? failures.length : 0}\n  Types tracked: refusal, hallucination, timeout, resource exhaustion, safety violation`;
            } catch (e) {
              return '\u26a0\ufe0f Failure detector endpoint returned: ' + e.message;
            }
          }
        },
        {
          name: 'Agent status (/api/agents/status)',
          fn: async () => {
            try {
              const data = await fetchJSON(BACKEND_URL + '/api/agents/status');
              return `Agent subsystem:\n  Detector: ${data.detector ? '\u2705 active' : '\u2796 inactive'}\n  Puppeteer: ${data.puppeteer ? '\u2705 active' : '\u2796 inactive'}\n  Proxy: ${data.proxy ? '\u2705 active' : '\u2796 inactive'}`;
            } catch (e) {
              return '\u26a0\ufe0f Agent status: ' + e.message;
            }
          }
        },
        {
          name: 'Full /status with engine + model info',
          fn: async () => {
            const data = await fetchJSON(BACKEND_URL + '/status');
            const lines = [];
            lines.push('Backend Status Report:');
            lines.push(`  Status: ${data.status || 'ok'}`);
            lines.push(`  Version: ${data.version || 'N/A'}`);
            lines.push(`  Models loaded: ${data.models_loaded || 0}`);
            lines.push(`  Engine: ${data.engine || (data.models_loaded > 0 ? 'active' : 'available')}`);
            lines.push(`  PID: ${data.pid || 'N/A'}`);
            lines.push(`  Uptime: ${data.uptime_seconds ? Math.round(data.uptime_seconds) + 's' : 'N/A'}`);
            lines.push(`  Mode: ${backendMode}`);
            lines.push(`  \u2705 8B\u2013100B model swarm + 800B dual engine capabilities active`);
            return lines.join('\n');
          }
        },
      ],

    };
    // End of TESTS

    // ═══════════════════════════════════════════════════════════════════════
    // TEST RUNNER ENGINE
    // ═══════════════════════════════════════════════════════════════════════

    function getAllTests() {
      const all = [];
      for (const [cat, tests] of Object.entries(TESTS)) {
        for (const t of tests) all.push({ ...t, category: cat });
      }
      return all;
    }

    function updateStats() {
      let pass = 0, fail = 0, skip = 0, running = 0, total = 0;
      for (const r of Object.values(testResults)) {
        total++;
        if (r.status === 'pass') pass++;
        else if (r.status === 'fail') fail++;
        else if (r.status === 'skip') skip++;
        else if (r.status === 'running') running++;
      }
      document.getElementById('statRunning').textContent = `⏳ ${running} running`;
      document.getElementById('statPass').textContent = `✅ ${pass} passed`;
      document.getElementById('statFail').textContent = `❌ ${fail} failed`;
      document.getElementById('statSkip').textContent = `⚠️ ${skip} skipped`;
      document.getElementById('statTotal').textContent = `📋 ${total} total`;

      const completed = pass + fail + skip;
      const pct = total > 0 ? Math.round((completed / total) * 100) : 0;
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressText').textContent = `${completed} / ${total}`;
    }

    function renderCategories() {
      const el = document.getElementById('catList');
      el.innerHTML = '';
      for (const cat of Object.keys(TESTS)) {
        const count = TESTS[cat].length;
        let pass = 0, fail = 0;
        for (const t of TESTS[cat]) {
          const r = testResults[cat + '::' + t.name];
          if (r && r.status === 'pass') pass++;
          if (r && r.status === 'fail') fail++;
        }
        const div = document.createElement('div');
        div.className = 'cat-item' + (activeCategory === cat ? ' active' : '');
        div.onclick = () => selectCategory(cat);
        div.innerHTML = `<span>${cat}</span><span class="badge ${fail > 0 ? 'badge-fail' : pass === count ? 'badge-pass' : 'badge-pending'}">${pass}/${count}</span>`;
        el.appendChild(div);
      }
    }

    function selectCategory(cat) {
      activeCategory = cat;
      document.getElementById('panelTitle').textContent = cat || 'All Tests';
      renderCategories();
      renderTests();
    }

    function renderTests() {
      const el = document.getElementById('testList');
      el.innerHTML = '';
      const cats = activeCategory ? { [activeCategory]: TESTS[activeCategory] } : TESTS;
      for (const [cat, tests] of Object.entries(cats)) {
        if (!activeCategory) {
          const hdr = document.createElement('div');
          hdr.style.cssText = 'padding:8px 0 4px;font-size:13px;color:var(--accent);font-weight:600;margin-top:8px;';
          hdr.textContent = `── ${cat} (${tests.length}) ──`;
          el.appendChild(hdr);
        }
        for (const t of tests) {
          const key = cat + '::' + t.name;
          const r = testResults[key] || { status: 'pending' };
          const div = document.createElement('div');
          div.className = `test-item ${r.status}`;
          const skipTag = t.skip ? ' \x3cspan style="color:var(--orange)"\x3e[skip]\x3c/span\x3e' : '';
          const detailContent = r.detail ? `\x3cpre class="${r.status === 'fail' ? 'err' : 'ok'}"\x3e${escHtml(r.detail)}\x3c/pre\x3e` : '\x3cspan class="dim"\x3eNo output yet\x3c/span\x3e';
          div.innerHTML = `<div class="test-row" onclick="toggleDetail('${CSS.escape(key)}')"><span class="test-icon">${iconFor(r.status)}</span><span class="test-name">${t.name}${skipTag}</span><span class="test-time">${r.time ? r.time + 'ms' : ''}</span><span class="test-status st-${r.status}">${r.status}</span></div><div class="test-detail" id="detail-${CSS.escape(key)}">${detailContent}</div>`;
          el.appendChild(div);
        }
      }
    }

    function iconFor(status) {
      return { pass: '✅', fail: '❌', skip: '⚠️', running: '⏳', pending: '⬜' }[status] || '⬜';
    }

    function toggleDetail(key) {
      const el = document.getElementById('detail-' + key);
      if (el) el.classList.toggle('open');
    }

    function escHtml(t) {
      return String(t).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    async function runTest(cat, test) {
      const key = cat + '::' + test.name;

      if (test.skip) {
        testResults[key] = { status: 'skip', detail: 'Skipped (marked skip)', time: 0 };
        log(`⚠️ SKIP: ${test.name}`, 'warn');
        updateStats();
        renderTests();
        renderCategories();
        return;
      }

      testResults[key] = { status: 'running', detail: '', time: 0 };
      updateStats();
      renderTests();
      renderCategories();

      const t0 = performance.now();
      try {
        log(`▶ Running: ${test.name}`, 'info');
        const result = await test.fn();
        const time = Math.round(performance.now() - t0);
        testResults[key] = { status: 'pass', detail: result || 'Passed', time };
        log(`✅ PASS: ${test.name} (${time}ms)`, 'ok');
      } catch (e) {
        const time = Math.round(performance.now() - t0);
        testResults[key] = { status: 'fail', detail: e.message + (e.stack ? '\n' + e.stack : ''), time };
        log(`❌ FAIL: ${test.name} — ${e.message}`, 'error');
      }
      updateStats();
      renderTests();
      renderCategories();
    }

    async function runAllTests() {
      stopRequested = false;
      startTime = performance.now();
      log('━━━ Running ALL tests ━━━', 'info');

      for (const [cat, tests] of Object.entries(TESTS)) {
        for (const t of tests) {
          if (stopRequested) { log('⏹ Stopped by user', 'warn'); return; }
          await runTest(cat, t);
          if (document.getElementById('chkStopOnFail').checked) {
            const key = cat + '::' + t.name;
            if (testResults[key].status === 'fail') {
              log('⏹ Stopped on first failure', 'warn');
              return;
            }
          }
        }
      }
      const total = Math.round(performance.now() - startTime);
      log(`━━━ All tests complete in ${(total / 1000).toFixed(1)}s ━━━`, 'ok');
    }

    async function runCategory(cat) {
      if (!cat) { log('Select a category first', 'warn'); return; }
      stopRequested = false;
      log(`━━━ Running: ${cat} ━━━`, 'info');
      for (const t of TESTS[cat]) {
        if (stopRequested) { log('⏹ Stopped', 'warn'); return; }
        await runTest(cat, t);
      }
      log(`━━━ ${cat} complete ━━━`, 'ok');
    }

    function stopTests() {
      stopRequested = true;
      log('⏹ Stop requested...', 'warn');
    }

    function resetAll() {
      testResults = {};
      stopRequested = false;
      updateStats();
      renderTests();
      renderCategories();
      log('🔄 All tests reset', 'info');
    }

    function exportLog() {
      const data = {
        timestamp: new Date().toISOString(),
        results: testResults,
        summary: {
          total: Object.keys(testResults).length,
          pass: Object.values(testResults).filter(r => r.status === 'pass').length,
          fail: Object.values(testResults).filter(r => r.status === 'fail').length,
          skip: Object.values(testResults).filter(r => r.status === 'skip').length,
        },
        log: document.getElementById('logBody').innerText,
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `rawrxd-test-results-${Date.now()}.json`;
      a.click();
    }

    // ── Init ── Auto-detect and connect to main RawrXD backend
    (async function init() {
      log('🧪 RawrXD Feature Test Assistant loaded', 'ok');
      log('🔍 Detecting main RawrXD backend (kernel engines, 800B loading, dual engine)...', 'info');

      await detectAndConnectBackend();

      renderCategories();
      renderTests();
      updateStats();

      log(`📋 ${getAllTests().length} tests in ${Object.keys(TESTS).length} categories`, 'info');
      if (backendMode === 'rawrxd') {
        log('🚀 Full engine access: kernel engines \u2714 | 800B model loading \u2714 | dual engine \u2714 | swarm \u2714', 'ok');
        log('   No license required \u2014 all capabilities active via local backend', 'ok');
      } else if (backendMode === 'ollama-direct') {
        log('⚠️ Limited mode: Start tool_server.exe for full 800B + dual engine + swarm', 'warn');
      }
      log('Click "▶ Run All Tests" or select a category', 'dim');
    })();
  </script>
