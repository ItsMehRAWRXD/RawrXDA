name: Build and Release Win32 IDE

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  CMAKE_VERSION: 3.20.x

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Setup CMake
      uses: lukka/get-cmake@latest
      with:
        cmakeVersion: ${{ env.CMAKE_VERSION }}
        
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1
      
    - name: Cache CMake build
      uses: actions/cache@v3
      with:
        path: build-win32-only
        key: ${{ runner.os }}-cmake-${{ hashFiles('**/CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-cmake-
          
    - name: Configure CMake
      run: |
        cmake -S win32_only -B build-win32-only `
          -G "Visual Studio 17 2022" -A x64 `
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          
    - name: Build
      run: |
        cmake --build build-win32-only `
          --config ${{ env.BUILD_TYPE }} `
          --target AgenticIDEWin `
          --parallel
          
    - name: Run tests
      run: |
        cd build-win32-only/bin/${{ env.BUILD_TYPE }}
        if (Test-Path "file_tree_test.exe") {
          ./file_tree_test.exe
        }
        
    - name: Package artifacts
      run: |
        $deployDir = "RawrXD-Win32-Deploy"
        New-Item -ItemType Directory -Force -Path "$deployDir/bin"
        New-Item -ItemType Directory -Force -Path "$deployDir/config"
        New-Item -ItemType Directory -Force -Path "$deployDir/docs"
        
        Copy-Item "build-win32-only/bin/${{ env.BUILD_TYPE }}/AgenticIDEWin.exe" "$deployDir/bin/"
        Copy-Item "docs/*.md" "$deployDir/docs/"
        Copy-Item "WIN32_README.md" "$deployDir/"
        Copy-Item "COMPLETION_SUMMARY.md" "$deployDir/"
        
        # Create config.json
        @'
        {
          "version": "1.0.0",
          "theme": "dark",
          "defaultShell": "pwsh",
          "autoSave": true,
          "telemetryEnabled": false
        }
        '@ | Out-File -FilePath "$deployDir/config/config.json" -Encoding utf8
        
        Compress-Archive -Path "$deployDir/*" -DestinationPath "RawrXD-Win32-${{ github.ref_name }}.zip"
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: RawrXD-Win32-${{ github.ref_name }}
        path: RawrXD-Win32-${{ github.ref_name }}.zip
        retention-days: 30
        
    - name: Calculate checksums
      run: |
        $hash = Get-FileHash "RawrXD-Win32-${{ github.ref_name }}.zip" -Algorithm SHA256
        "$($hash.Hash)  RawrXD-Win32-${{ github.ref_name }}.zip" | Out-File -FilePath checksums.txt
        
    - name: Upload checksums
      uses: actions/upload-artifact@v3
      with:
        name: checksums
        path: checksums.txt
        
  create-release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v3
      
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          RawrXD-Win32-*/RawrXD-Win32-*.zip
          checksums/checksums.txt
        body: |
          ## RawrXD Win32 IDE Release ${{ github.ref_name }}
          
          ### Changes
          - Full Win32 native implementation
          - Zero Qt dependencies
          - Production-ready build
          
          ### Installation
          1. Download `RawrXD-Win32-${{ github.ref_name }}.zip`
          2. Extract to desired location
          3. Set `OPENAI_API_KEY` environment variable
          4. Run `RawrXD.ps1` or `RawrXD.bat`
          
          ### Requirements
          - Windows 10/11 (x64)
          - Visual C++ Redistributable 2022
          - Node.js v18+ (for AI features)
          
          ### Documentation
          See `docs/` directory in the package for full documentation.
          
          ### Checksums
          SHA256 checksums available in `checksums.txt`
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
  code-quality:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Run static analysis
      run: |
        # Basic code quality checks
        $cppFiles = Get-ChildItem -Path src/win32,include/win32 -Include *.cpp,*.h -Recurse
        
        Write-Host "Checking $($cppFiles.Count) files..."
        
        # Check for common issues
        $issues = @()
        foreach ($file in $cppFiles) {
          $content = Get-Content $file.FullName -Raw
          
          # Check for TODO/FIXME comments
          if ($content -match 'TODO|FIXME') {
            $issues += "Found TODO/FIXME in $($file.Name)"
          }
          
          # Check for deprecated functions
          if ($content -match 'strcpy|strcat|sprintf') {
            $issues += "Unsafe string function in $($file.Name)"
          }
        }
        
        if ($issues.Count -gt 0) {
          Write-Host "⚠️ Code quality issues found:"
          $issues | ForEach-Object { Write-Host "  - $_" }
        } else {
          Write-Host "✅ No code quality issues found"
        }
