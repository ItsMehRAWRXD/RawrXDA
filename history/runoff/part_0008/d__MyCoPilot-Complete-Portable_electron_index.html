<!DOCTYPE html>
<html>
<head>
    <title>Copilot++ IDE</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background: #1e1e1e;
            color: #fff;
        }
        #ide-container {
            display: flex;
            height: 100vh;
        }
        #sidebar {
            width: 200px;
            background: #252526;
            padding: 10px;
        }
        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        #editor {
            flex: 1;
            background: #1e1e1e;
            padding: 10px;
        }
        #status-bar {
            height: 25px;
            background: #007acc;
            padding: 0 10px;
            display: flex;
            align-items: center;
            font-size: 12px;
        }
        .status-item {
            margin-right: 15px;
        }
    </style>
</head>
<body>
    <div id="ide-container">
        <div id="sidebar">
            <h3>Copilot++ IDE</h3>
            <div id="file-explorer"></div>
        </div>
        <div id="main-content">
            <div id="editor">
                <!-- Editor content will be injected here -->
            </div>
            <div id="status-bar">
                <span class="status-item" id="status">Initializing...</span>
                <span class="status-item" id="cursor-pos">Ln 1, Col 1</span>
                <span class="status-item" id="file-type">No file</span>
            </div>
        </div>
    </div>
    <script src="renderer.js"></script>
</body>
</html>
