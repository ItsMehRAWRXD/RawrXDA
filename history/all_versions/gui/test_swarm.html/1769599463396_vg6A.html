<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swarm Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .test-result {
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <h1>Swarm Functionality Test</h1>
    <div id="results"></div>
    
    <script>
        function addResult(message, success = true) {
            const div = document.createElement('div');
            div.className = `test-result ${success ? 'success' : 'error'}`;
            div.textContent = `${success ? '✅' : '❌'} ${message}`;
            document.getElementById('results').appendChild(div);
        }

        // Test swarm functionality
        try {
            // Test swarm mode toggle
            if (typeof toggleSwarmMode === 'function') {
                addResult('toggleSwarmMode function exists');
            } else {
                addResult('toggleSwarmMode function missing', false);
            }

            // Test swarm deployment
            if (typeof deploySwarm === 'function') {
                addResult('deploySwarm function exists');
            } else {
                addResult('deploySwarm function missing', false);
            }

            // Test debug functionality
            if (typeof showDebugPanel === 'function') {
                addResult('showDebugPanel function exists');
            } else {
                addResult('showDebugPanel function missing', false);
            }

            // Test context window update
            if (typeof updateContextWindow === 'function') {
                addResult('updateContextWindow function exists');
            } else {
                addResult('updateContextWindow function missing', false);
            }

            addResult('All core swarm functions implemented successfully!');

        } catch (error) {
            addResult(`Test failed: ${error.message}`, false);
        }
    </script>
</body>
</html>
