# sovereign-ci.yml — Sovereign TPS floor + optional GGUF gate (source contract hook)
#
# When model/*.gguf is present in the repo or CI cache, builds RawrXD-TpsSmoke and runs
# scripts/Run-TpsSmoke.ps1 with -RequireBeat so regressions fail the job.
# Sentinel 0x1751431337 / Heretic paths are exercised via the same inference stack as the IDE.
#
# Without a GGUF artifact, the TPS job is skipped (notice) so forks do not fail blindly.

name: Sovereign CI (TPS floor)

on:
  workflow_dispatch:
  push:
    branches: [main, dev]
    paths:
      - 'src/asm/**'
      - 'src/**/Inference*.cpp'
      - 'src/**/Sovereign*.cpp'
      - 'src/hotpatch/**'
      - 'scripts/Run-TpsSmoke.ps1'
      - '.github/workflows/sovereign-ci.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'src/asm/**'
      - 'src/**/Inference*.cpp'
      - 'src/**/Sovereign*.cpp'
      - 'src/hotpatch/**'
      - 'scripts/Run-TpsSmoke.ps1'
      - '.github/workflows/sovereign-ci.yml'

permissions:
  contents: read

jobs:
  sovereign-tps-floor:
    name: TPS floor (RawrXD-TpsSmoke)
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure CMake
        run: cmake -S "${{ github.workspace }}" -B "${{ github.workspace }}/build" -A x64

      - name: Build RawrXD-TpsSmoke
        run: cmake --build "${{ github.workspace }}/build" --config Release --target RawrXD-TpsSmoke

      - name: Run TPS gate (requires model/*.gguf)
        shell: pwsh
        env:
          RAWRXD_TPS_REF: ${{ vars.RAWRXD_TPS_REF }}
        run: |
          $root = "${{ github.workspace }}"
          if (-not $env:RAWRXD_TPS_REF) { $env:RAWRXD_TPS_REF = '50' }
          $modelDir = Join-Path $root "model"
          $gguf = Get-ChildItem -Path $modelDir -Filter "*.gguf" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $gguf) {
            Write-Host "::notice::No .gguf under model/ — skipping TPS RequireBeat gate (add a GGUF or use workflow_dispatch with a cached path)."
            exit 0
          }
          & "$root/scripts/Run-TpsSmoke.ps1" -BuildDir "$root/build" -Config Release -SkipBuild -RequireBeat -ModelPath $gguf.FullName
