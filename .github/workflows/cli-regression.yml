# RawrXD CLI Regression CI
# Validates all 18 CLI modes against CLI_CONTRACT_v1.0.md (v1.1 addendum)
# Triggered on push/PR to main, or manual dispatch

name: CLI Regression

on:
  push:
    branches: [main]
    paths:
      - 'RawrXD_IDE_unified.asm'
      - 'ci/Test-CLIRegression.ps1'
      - 'CLI_CONTRACT_v1.0.md'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  cli-regression:
    name: CLI Contract Validation
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup MASM (ml64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Assemble RawrXD_IDE_unified
        run: |
          ml64 /c /Fo RawrXD_IDE_unified.obj RawrXD_IDE_unified.asm
          link /SUBSYSTEM:CONSOLE /ENTRY:_start_entry /OUT:RawrXD_IDE_unified.exe ^
            RawrXD_IDE_unified.obj kernel32.lib user32.lib advapi32.lib shell32.lib
        shell: cmd

      - name: Run CLI Regression Tests
        run: |
          pwsh -ExecutionPolicy Bypass -File ci/Test-CLIRegression.ps1 `
            -Binary ".\RawrXD_IDE_unified.exe" `
            -SkipPersist `
            -SkipElevated `
            -LatencyThresholdMs 10000

      - name: Upload CI Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cli-regression-report
          path: |
            ci_regression_report.json
            rawrxd_ide.log
            trace_map.json
            bbcov_report.json
            covfusion_report.json
          retention-days: 30

      - name: Check Results
        if: always()
        run: |
          if (Test-Path "ci_regression_report.json") {
            $report = Get-Content "ci_regression_report.json" | ConvertFrom-Json
            Write-Host "Total: $($report.total) | Passed: $($report.passed) | Failed: $($report.failed) | Skipped: $($report.skipped)"
            if ($report.failed -gt 0) {
              Write-Host "::error::$($report.failed) CLI regression test(s) failed"
              exit 1
            }
          }
