name: RawrXD Wiring Digest

on:
  push:
    paths:
      - 'scripts/*.psm1'
      - 'scripts/*.ps1'
      - '.github/workflows/wiring-digest.yml'
  pull_request:
    paths:
      - 'scripts/*.psm1'
      - 'scripts/*.ps1'
  workflow_dispatch:

jobs:
  wiring-validation:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4

      - name: Run Source Wiring Digest
        id: digest
        run: |
          $ErrorActionPreference = 'Stop'
          $root = $env:GITHUB_WORKSPACE
          $digestPath = Join-Path $root 'scripts\SourceWiringDigest.ps1'
          if (-not (Test-Path $digestPath)) { throw "Digest script not found: $digestPath" }

          & $digestPath -RootPath $root -ModuleDir (Join-Path $root 'scripts') -RulesProfile default -WarnOnly

          $reportPath = Join-Path $root 'WIRING_DIGEST_REPORT.md'
          if (-not (Test-Path $reportPath)) { throw "Digest report not found: $reportPath" }

          $report = Get-Content $reportPath
          $unwiredIndex = ($report | Select-String '^## Unwired Modules' -List).LineNumber
          $nextHeader = ($report | Select-String '^## ' | Where-Object { $_.LineNumber -gt $unwiredIndex } | Select-Object -First 1).LineNumber
          if (-not $nextHeader) { $nextHeader = $report.Count + 1 }

          $unwiredLines = $report[($unwiredIndex)..($nextHeader - 2)] | Where-Object { $_ -match '^-\s+' }
          $unwiredCount = $unwiredLines.Count

          $riskLine = ($report | Select-String '^- Packaging risk score:' -List).Line
          $riskScore = 0
          if ($riskLine -match '(\d+)') { $riskScore = [int]$Matches[1] }

          "unwired_count=$unwiredCount" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "packaging_risk=$riskScore" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

          if ($unwiredCount -gt 0) { throw "Wiring regression: $unwiredCount unwired modules" }
          if ($riskScore -gt 250) { Write-Warning "High packaging risk: $riskScore" }

      - name: Verify Module Loading
        run: |
          Set-Location (Join-Path $env:GITHUB_WORKSPACE 'scripts')
          Import-Module (Join-Path $env:GITHUB_WORKSPACE 'RawrXD.Modular.ps1') -Force -Verbose

          @('DependencyManager', 'PerformanceFramework', 'SecurityFramework') | ForEach-Object {
            if (-not (Get-Module $_)) { throw "$_ not loaded" }
            Write-Host "✓ $_ loaded" -ForegroundColor Green
          }

          if (-not $Global:RawrXDModularContext) { throw "Context not initialized" }
          Write-Host "✓ Integration context initialized" -ForegroundColor Green

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wiring-report
          path: WIRING_DIGEST_REPORT.md
          retention-days: 30
