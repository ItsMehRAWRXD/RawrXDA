name: Agent Wiring Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate-agent-wiring:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Strict parity and wiring validation
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File ".\scripts\validate_agent_wiring.ps1" -RepoRoot "$pwd"
