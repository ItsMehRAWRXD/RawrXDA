# ============================================================================
# gold-sign.yml — GOLD_SIGN: EV Certificate Signing CI/CD Pipeline
# ============================================================================
# Triggered after a successful release build to sign all production binaries
# with an EV (Extended Validation) code signing certificate.
#
# EV certificates provide instant Windows SmartScreen reputation.
# Private keys never leave hardware (HSM / USB token / Azure Key Vault).
# ============================================================================

name: GOLD_SIGN

on:
  workflow_run:
    workflows: ["Release & Deployment"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Release workflow run ID to sign artifacts from'
        required: false
        type: string
      sign_mode:
        description: 'Signing mode'
        required: true
        default: 'ev-thumbprint'
        type: choice
        options:
          - ev-thumbprint
          - azure-trusted-signing
          - hardware-token
      dual_sign:
        description: 'Dual-sign (SHA1 + SHA256) for legacy Windows support'
        required: false
        default: false
        type: boolean
      dry_run:
        description: 'Dry run (verify configuration without signing)'
        required: false
        default: false
        type: boolean

# Only one GOLD_SIGN run at a time
concurrency:
  group: gold-sign-${{ github.ref }}
  cancel-in-progress: false

env:
  GOLD_SIGN_TIMESTAMP: "http://timestamp.digicert.com"
  GOLD_SIGN_DIGEST: "SHA256"
  GOLD_SIGN_STORE: "My"

jobs:
  # ================================================================
  # Pre-flight: Validate signing prerequisites
  # ================================================================
  preflight:
    name: Pre-flight Checks
    runs-on: windows-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      sign_mode: ${{ steps.config.outputs.sign_mode }}
      artifacts_run_id: ${{ steps.config.outputs.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Signing Mode
        id: config
        shell: pwsh
        run: |
          # Determine signing mode
          $mode = "${{ github.event.inputs.sign_mode }}"
          if (-not $mode) { $mode = "ev-thumbprint" }
          echo "sign_mode=$mode" >> $env:GITHUB_OUTPUT

          # Determine which workflow run to pull artifacts from
          $runId = "${{ github.event.inputs.run_id }}"
          if (-not $runId -and "${{ github.event_name }}" -eq "workflow_run") {
            $runId = "${{ github.event.workflow_run.id }}"
          }
          echo "run_id=$runId" >> $env:GITHUB_OUTPUT

          Write-Host "GOLD_SIGN Configuration:"
          Write-Host "  Mode:     $mode"
          Write-Host "  Run ID:   $runId"
          Write-Host "  Dual-Sign: ${{ github.event.inputs.dual_sign }}"
          Write-Host "  Dry-Run:  ${{ github.event.inputs.dry_run }}"

      - name: Validate EV Certificate Access
        if: steps.config.outputs.sign_mode == 'ev-thumbprint'
        shell: pwsh
        env:
          GOLD_SIGN_THUMBPRINT: ${{ secrets.GOLD_SIGN_THUMBPRINT }}
        run: |
          if (-not $env:GOLD_SIGN_THUMBPRINT) {
            Write-Error "GOLD_SIGN_THUMBPRINT secret not configured"
            exit 1
          }
          Write-Host "EV certificate thumbprint configured (length: $($env:GOLD_SIGN_THUMBPRINT.Length))"

      - name: Validate Azure Trusted Signing
        if: steps.config.outputs.sign_mode == 'azure-trusted-signing'
        shell: pwsh
        env:
          GOLD_SIGN_AZURE_ENDPOINT: ${{ secrets.GOLD_SIGN_AZURE_ENDPOINT }}
          GOLD_SIGN_AZURE_TENANT: ${{ secrets.GOLD_SIGN_AZURE_TENANT }}
          GOLD_SIGN_AZURE_PROFILE: ${{ secrets.GOLD_SIGN_AZURE_PROFILE }}
        run: |
          $missing = @()
          if (-not $env:GOLD_SIGN_AZURE_ENDPOINT) { $missing += "GOLD_SIGN_AZURE_ENDPOINT" }
          if (-not $env:GOLD_SIGN_AZURE_TENANT)   { $missing += "GOLD_SIGN_AZURE_TENANT" }
          if (-not $env:GOLD_SIGN_AZURE_PROFILE)   { $missing += "GOLD_SIGN_AZURE_PROFILE" }
          if ($missing.Count -gt 0) {
            Write-Error "Missing Azure Trusted Signing secrets: $($missing -join ', ')"
            exit 1
          }
          Write-Host "Azure Trusted Signing configuration validated"

      - name: Verify signtool.exe Available
        shell: pwsh
        run: |
          # Search for signtool in Windows SDK
          $sdkBase = "${env:ProgramFiles(x86)}\Windows Kits\10\bin"
          $signtool = $null

          if (Test-Path $sdkBase) {
            $versions = Get-ChildItem $sdkBase -Directory | Sort-Object Name -Descending
            foreach ($ver in $versions) {
              $tool = Join-Path $ver.FullName "x64\signtool.exe"
              if (Test-Path $tool) { $signtool = $tool; break }
            }
          }

          if (-not $signtool) {
            $signtool = Get-Command signtool.exe -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source
          }

          if ($signtool) {
            Write-Host "signtool.exe found: $signtool"
            & $signtool /? 2>&1 | Select-Object -First 3
          } else {
            Write-Error "signtool.exe not found — install Windows 10/11 SDK"
            exit 1
          }

  # ================================================================
  # GOLD_SIGN: Sign release artifacts
  # ================================================================
  gold-sign:
    name: "GOLD_SIGN (${{ matrix.platform }})"
    runs-on: windows-latest
    needs: preflight
    environment:
      name: production-signing
    strategy:
      fail-fast: true
      matrix:
        platform: [x64, x86, ARM64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Release Artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: ./artifacts
          run-id: ${{ needs.preflight.outputs.artifacts_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Release Package
        shell: pwsh
        run: |
          cd artifacts
          Get-ChildItem -Filter "*.zip" | ForEach-Object {
            Write-Host "Extracting: $($_.Name)"
            Expand-Archive -Path $_.FullName -DestinationPath .\extracted -Force
          }
          Write-Host ""
          Write-Host "Binaries to sign:"
          Get-ChildItem .\extracted -Recurse -Include *.exe,*.dll,*.msi | ForEach-Object {
            Write-Host "  $($_.FullName) ($([math]::Round($_.Length/1KB)) KB)"
          }

      - name: "GOLD_SIGN: EV Certificate Signing"
        shell: pwsh
        env:
          GOLD_SIGN_THUMBPRINT: ${{ secrets.GOLD_SIGN_THUMBPRINT }}
          GOLD_SIGN_SUBJECT: ${{ secrets.GOLD_SIGN_SUBJECT }}
          GOLD_SIGN_CSP: ${{ secrets.GOLD_SIGN_CSP }}
          GOLD_SIGN_KC: ${{ secrets.GOLD_SIGN_KC }}
          GOLD_SIGN_TOKEN_PIN: ${{ secrets.GOLD_SIGN_TOKEN_PIN }}
          GOLD_SIGN_AZURE_ENDPOINT: ${{ secrets.GOLD_SIGN_AZURE_ENDPOINT }}
          GOLD_SIGN_AZURE_TENANT: ${{ secrets.GOLD_SIGN_AZURE_TENANT }}
          GOLD_SIGN_AZURE_PROFILE: ${{ secrets.GOLD_SIGN_AZURE_PROFILE }}
        run: |
          $extraArgs = @()
          if ("${{ github.event.inputs.dual_sign }}" -eq "true") {
            $extraArgs += "-DualSign"
          }
          if ("${{ github.event.inputs.dry_run }}" -eq "true") {
            $extraArgs += "-DryRun"
          }

          & "${{ github.workspace }}\gold_sign.ps1" `
            -BuildDir ".\artifacts\extracted" `
            -Force `
            @extraArgs

          if ($LASTEXITCODE -ne 0) {
            Write-Error "GOLD_SIGN failed with exit code $LASTEXITCODE"
            exit 1
          }

      - name: Verify All Signatures
        shell: pwsh
        run: |
          $failed = 0
          $verified = 0

          Get-ChildItem .\artifacts\extracted -Recurse -Include *.exe,*.dll,*.msi | ForEach-Object {
            $sig = Get-AuthenticodeSignature -FilePath $_.FullName
            if ($sig.Status -eq "Valid") {
              Write-Host "[VERIFIED] $($_.Name)" -ForegroundColor Green
              Write-Host "  Subject: $($sig.SignerCertificate.Subject)"
              Write-Host "  Issuer:  $($sig.SignerCertificate.Issuer)"
              Write-Host "  Expires: $($sig.SignerCertificate.NotAfter)"
              $ts = if ($sig.TimeStamperCertificate) { "Yes" } else { "No" }
              Write-Host "  Timestamped: $ts"
              $verified++
            } else {
              Write-Host "[FAILED] $($_.Name) — Status: $($sig.Status)" -ForegroundColor Red
              $failed++
            }
          }

          Write-Host ""
          Write-Host "Verification: $verified passed, $failed failed"

          if ($failed -gt 0) {
            Write-Error "$failed binaries have invalid or missing signatures"
            exit 1
          }

      - name: Re-package Signed Artifacts
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -Replace "^v", ""
          if (-not $version) { $version = "latest" }
          $platform = "${{ matrix.platform }}"

          $outZip = "RawrXD-AgenticIDE-${version}-${platform}-GOLD_SIGNED.zip"

          # Copy attestation into the package
          if (Test-Path "GOLD_SIGN_ATTESTATION.json") {
            Copy-Item "GOLD_SIGN_ATTESTATION.json" ".\artifacts\extracted\" -Force
          }

          Compress-Archive -Path ".\artifacts\extracted\*" -DestinationPath $outZip -Force
          Write-Host "Signed package: $outZip ($([math]::Round((Get-Item $outZip).Length/1MB, 2)) MB)"

      - name: Upload GOLD_SIGNED Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gold-signed-${{ matrix.platform }}
          path: "*-GOLD_SIGNED.zip"
          retention-days: 365

      - name: Upload Signing Attestation
        uses: actions/upload-artifact@v4
        with:
          name: gold-sign-attestation-${{ matrix.platform }}
          path: GOLD_SIGN_ATTESTATION.json
          retention-days: 365

  # ================================================================
  # Post-signing: Update GitHub Release with signed binaries
  # ================================================================
  update-release:
    name: Update GitHub Release
    runs-on: ubuntu-latest
    needs: gold-sign
    if: github.event_name == 'workflow_run' || github.ref_type == 'tag'

    steps:
      - name: Download All GOLD_SIGNED Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: gold-signed-*

      - name: Download All Attestations
        uses: actions/download-artifact@v4
        with:
          pattern: gold-sign-attestation-*

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            gold-signed-*/*-GOLD_SIGNED.zip
            gold-sign-attestation-*/GOLD_SIGN_ATTESTATION.json
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post Signing Report
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = `## GOLD_SIGN Complete

            All production binaries have been signed with an EV code signing certificate.

            ### Signed Platforms
            - Windows x64
            - Windows x86
            - Windows ARM64

            ### Verification
            All binaries passed post-sign Authenticode verification.
            Attestation manifests (\`GOLD_SIGN_ATTESTATION.json\`) are attached to each platform artifact.

            ### SmartScreen
            EV-signed binaries receive immediate Windows SmartScreen reputation — no gradual trust buildup required.

            ---
            *Signed by GOLD_SIGN pipeline at ${new Date().toISOString()}*`;

            // Try to comment on the release
            try {
              const releases = await github.rest.repos.listReleases({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 5
              });
              if (releases.data.length > 0) {
                const release = releases.data[0];
                await github.rest.repos.updateRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: release.id,
                  body: release.body + '\n\n' + body
                });
              }
            } catch (e) {
              console.log('Could not update release:', e.message);
            }
