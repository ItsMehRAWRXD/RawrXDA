[package]
name = "rawrz-rust-engine"
version = "1.0.0"
edition = "2021"

[dependencies]
rand = "0.8"
aes-gcm = "0.10"
chacha20poly1305 = "0.10"
clap = { version = "4.0", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[[bin]]
name = "rawrz-rust"
path = "src/main.rs"