<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Q Journal</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-book"></i> Amazon Q Journal</h2>
                <button class="new-entry-btn" id="newEntryBtn">
                    <i class="fas fa-plus"></i> New Entry
                </button>
            </div>
            
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search entries...">
                <i class="fas fa-search"></i>
            </div>
            
            <div class="entries-list" id="entriesList">
                <!-- Journal entries will be populated here -->
            </div>
            
            <div class="sidebar-footer">
                <button class="export-btn" id="exportBtn">
                    <i class="fas fa-download"></i> Export
                </button>
                <button class="import-btn" id="importBtn">
                    <i class="fas fa-upload"></i> Import
                </button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="toolbar">
                <div class="entry-info">
                    <span id="entryDate"></span>
                    <span id="entryTitle"></span>
                </div>
                <div class="toolbar-actions">
                    <button class="save-btn" id="saveBtn">
                        <i class="fas fa-save"></i> Save
                    </button>
                    <button class="delete-btn" id="deleteBtn">
                        <i class="fas fa-trash"></i> Delete
                    </button>
                </div>
            </div>
            
            <div class="editor-container">
                <div class="editor-tabs">
                    <button class="tab active" data-tab="write">
                        <i class="fas fa-edit"></i> Write
                    </button>
                    <button class="tab" data-tab="amazonq">
                        <i class="fas fa-robot"></i> Amazon Q
                    </button>
                    <button class="tab" data-tab="preview">
                        <i class="fas fa-eye"></i> Preview
                    </button>
                </div>
                
                <div class="tab-content">
                    <!-- Write Tab -->
                    <div class="tab-panel active" id="writeTab">
                        <textarea id="journalEditor" placeholder="Start writing your thoughts..."></textarea>
                    </div>
                    
                    <!-- Amazon Q Tab -->
                    <div class="tab-panel" id="amazonqTab">
                        <div class="amazonq-container">
                            <div class="amazonq-header">
                                <h3><i class="fas fa-robot"></i> Amazon Q Assistant</h3>
                                <div class="amazonq-actions">
                                    <button class="analyze-btn" id="analyzeBtn">
                                        <i class="fas fa-brain"></i> Analyze Entry
                                    </button>
                                    <button class="suggest-btn" id="suggestBtn">
                                        <i class="fas fa-lightbulb"></i> Get Suggestions
                                    </button>
                                </div>
                            </div>
                            
                            <div class="amazonq-chat" id="amazonqChat">
                                <div class="chat-messages" id="chatMessages">
                                    <div class="message assistant">
                                        <div class="message-content">
                                            <i class="fas fa-robot"></i>
                                            <p>Hello! I'm your Amazon Q assistant. I can help you analyze your journal entries, provide insights, suggest improvements, or answer questions about your writing.</p>
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="chat-input-container">
                                    <div class="chat-input">
                                        <input type="text" id="chatInput" placeholder="Ask Amazon Q anything...">
                                        <button id="sendBtn">
                                            <i class="fas fa-paper-plane"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Preview Tab -->
                    <div class="tab-panel" id="previewTab">
                        <div class="preview-content" id="previewContent">
                            <!-- Rendered markdown will appear here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Amazon Q Settings</h3>
                <button class="close-btn" id="closeSettingsBtn">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="awsRegion">AWS Region:</label>
                    <select id="awsRegion">
                        <option value="us-east-1">US East (N. Virginia)</option>
                        <option value="us-west-2">US West (Oregon)</option>
                        <option value="eu-west-1">Europe (Ireland)</option>
                        <option value="ap-southeast-1">Asia Pacific (Singapore)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="modelId">Model:</label>
                    <select id="modelId">
                        <option value="anthropic.claude-3-sonnet-20240229-v1:0">Claude 3 Sonnet</option>
                        <option value="anthropic.claude-3-haiku-20240307-v1:0">Claude 3 Haiku</option>
                        <option value="amazon.titan-text-express-v1">Titan Text Express</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="temperature">Temperature:</label>
                    <input type="range" id="temperature" min="0" max="1" step="0.1" value="0.7">
                    <span id="temperatureValue">0.7</span>
                </div>
            </div>
            <div class="modal-footer">
                <button class="save-settings-btn" id="saveSettingsBtn">Save Settings</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
