version: '3.8'

services:
  sunshine-engine:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SUNSHINE_ENGINE_MODE=production
      - GENERATION_INTERVAL=5000
      - DIGITAL_OCEAN_TOKEN=${DIGITAL_OCEAN_TOKEN}
    volumes:
      - ./generated_content:/app/generated_content
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./generated_content:/usr/share/nginx/html/generated
    depends_on:
      - sunshine-engine
    restart: unless-stopped