apiVersion: apps/v1
kind: Deployment
metadata:
  name: true
  namespace: true
spec:
  replicas: 2
  selector:
    matchLabels: { app: true }
  template:
    metadata:
      labels: { app: true }
    spec:
      containers:
        - name: app
          image: true:latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef: { name: true-secrets }
            - configMapRef: { name: true-config }
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
      volumes:
        - name: uploads
          emptyDir: {}
