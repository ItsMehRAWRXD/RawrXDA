<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RawrZ Delay Configuration Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .controls {
            padding: 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
        }

        .control-group {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .preset-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .preset-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .preset-btn.fast { background: #28a745; color: white; }
        .preset-btn.normal { background: #17a2b8; color: white; }
        .preset-btn.slow { background: #ffc107; color: black; }
        .preset-btn.realistic { background: #6f42c1; color: white; }
        .preset-btn.stealth { background: #dc3545; color: white; }

        .preset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #2196F3;
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        .main-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
            padding: 30px;
        }

        .category-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .category-card:hover {
            transform: translateY(-5px);
        }

        .category-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            font-size: 1.3em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .category-content {
            padding: 20px;
        }

        .delay-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }

        .delay-item:last-child {
            border-bottom: none;
        }

        .delay-label {
            font-weight: 600;
            color: #333;
            flex: 1;
        }

        .delay-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .delay-input {
            width: 80px;
            padding: 8px;
            border: 2px solid #ddd;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
        }

        .delay-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .ms-label {
            color: #666;
            font-size: 0.9em;
        }

        .status-bar {
            background: #f8f9fa;
            padding: 20px 30px;
            border-top: 1px solid #dee2e6;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-info {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .status-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .status-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
        }

        .status-label {
            font-size: 0.9em;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .save-btn {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            z-index: 1000;
            transform: translateX(400px);
            transition: transform 0.3s ease;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.success {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        }

        .notification.error {
            background: linear-gradient(135deg, #dc3545 0%, #e83e8c 100%);
        }

        .random-variation {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .variation-slider {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: #ddd;
            outline: none;
            -webkit-appearance: none;
        }

        .variation-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
        }

        .variation-slider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            border: none;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .control-group {
                flex-direction: column;
                align-items: stretch;
            }
            
            .preset-buttons {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⏱️ RawrZ Delay Configuration</h1>
            <p>Configure realistic timing delays for encryption operations</p>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>
                    <strong>Enable Delays:</strong>
                    <label class="toggle-switch">
                        <input type="checkbox" id="delaysEnabled" checked>
                        <span class="slider"></span>
                    </label>
                </label>
                
                <div class="random-variation">
                    <label><strong>Random Variation:</strong></label>
                    <input type="range" id="randomVariation" class="variation-slider" min="0" max="1" step="0.1" value="0.2">
                    <span id="variationValue">20%</span>
                </div>
            </div>

            <div class="control-group">
                <strong>Quick Presets:</strong>
                <div class="preset-buttons">
                    <button class="preset-btn fast" onclick="applyPreset('fast')">Fast</button>
                    <button class="preset-btn normal" onclick="applyPreset('normal')">Normal</button>
                    <button class="preset-btn slow" onclick="applyPreset('slow')">Slow</button>
                    <button class="preset-btn realistic" onclick="applyPreset('realistic')">Realistic</button>
                    <button class="preset-btn stealth" onclick="applyPreset('stealth')">Stealth</button>
                </div>
            </div>
        </div>

        <div class="main-content" id="delayCategories">
            <!-- Categories will be populated by JavaScript -->
        </div>

        <div class="status-bar">
            <div class="status-info">
                <div class="status-item">
                    <div class="status-value" id="totalDelays">0</div>
                    <div class="status-label">Total Delays</div>
                </div>
                <div class="status-item">
                    <div class="status-value" id="enabledStatus">Enabled</div>
                    <div class="status-label">Status</div>
                </div>
                <div class="status-item">
                    <div class="status-value" id="variationPercent">20%</div>
                    <div class="status-label">Variation</div>
                </div>
            </div>
            <button class="save-btn" onclick="saveConfiguration()">💾 Save Configuration</button>
        </div>
    </div>

    <div id="notification" class="notification"></div>

    <script>
        let currentDelays = {};
        let isEnabled = true;
        let randomVariation = 0.2;

        // Initialize the panel
        async function initializePanel() {
            try {
                await loadDelays();
                renderCategories();
                updateStatus();
            } catch (error) {
                showNotification('Failed to load delay configuration', 'error');
            }
        }

        // Load delays from API
        async function loadDelays() {
            const response = await fetch('/api/delays');
            const data = await response.json();
            
            if (data.success) {
                currentDelays = data.delays;
                isEnabled = data.enabled;
                randomVariation = data.randomVariation;
                
                document.getElementById('delaysEnabled').checked = isEnabled;
                document.getElementById('randomVariation').value = randomVariation;
                document.getElementById('variationValue').textContent = Math.round(randomVariation * 100) + '%';
                document.getElementById('variationPercent').textContent = Math.round(randomVariation * 100) + '%';
            } else {
                throw new Error(data.error);
            }
        }

        // Render delay categories
        function renderCategories() {
            const container = document.getElementById('delayCategories');
            container.innerHTML = '';

            Object.entries(currentDelays).forEach(([category, delays]) => {
                const categoryCard = createCategoryCard(category, delays);
                container.appendChild(categoryCard);
            });
        }

        // Create category card
        function createCategoryCard(category, delays) {
            const card = document.createElement('div');
            card.className = 'category-card';
            
            const header = document.createElement('div');
            header.className = 'category-header';
            header.textContent = category.replace(/([A-Z])/g, ' $1').replace(/^./, str => str.toUpperCase());
            
            const content = document.createElement('div');
            content.className = 'category-content';
            
            Object.entries(delays).forEach(([operation, delay]) => {
                const item = createDelayItem(category, operation, delay);
                content.appendChild(item);
            });
            
            card.appendChild(header);
            card.appendChild(content);
            
            return card;
        }

        // Create delay item
        function createDelayItem(category, operation, delay) {
            const item = document.createElement('div');
            item.className = 'delay-item';
            
            const label = document.createElement('div');
            label.className = 'delay-label';
            label.textContent = operation.replace(/([A-Z])/g, ' $1').replace(/^./, str => str.toUpperCase());
            
            const controls = document.createElement('div');
            controls.className = 'delay-controls';
            
            const input = document.createElement('input');
            input.type = 'number';
            input.className = 'delay-input';
            input.value = delay;
            input.min = '0';
            input.max = '10000';
            input.step = '1';
            input.addEventListener('change', () => {
                currentDelays[category][operation] = parseInt(input.value);
            });
            
            const msLabel = document.createElement('span');
            msLabel.className = 'ms-label';
            msLabel.textContent = 'ms';
            
            controls.appendChild(input);
            controls.appendChild(msLabel);
            
            item.appendChild(label);
            item.appendChild(controls);
            
            return item;
        }

        // Apply preset
        async function applyPreset(preset) {
            try {
                const response = await fetch('/api/delays/preset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ preset })
                });
                
                const data = await response.json();
                if (data.success) {
                    await loadDelays();
                    renderCategories();
                    updateStatus();
                    showNotification(`Applied ${preset} preset`, 'success');
                } else {
                    throw new Error(data.error);
                }
            } catch (error) {
                showNotification(`Failed to apply preset: ${error.message}`, 'error');
            }
        }

        // Save configuration
        async function saveConfiguration() {
            try {
                const response = await fetch('/api/delays/configure', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        delays: currentDelays,
                        enabled: isEnabled,
                        randomVariation: randomVariation
                    })
                });
                
                const data = await response.json();
                if (data.success) {
                    showNotification('Configuration saved successfully', 'success');
                } else {
                    throw new Error(data.error);
                }
            } catch (error) {
                showNotification(`Failed to save: ${error.message}`, 'error');
            }
        }

        // Update status display
        function updateStatus() {
            const totalDelays = Object.values(currentDelays).reduce((total, category) => 
                total + Object.keys(category).length, 0);
            
            document.getElementById('totalDelays').textContent = totalDelays;
            document.getElementById('enabledStatus').textContent = isEnabled ? 'Enabled' : 'Disabled';
            document.getElementById('variationPercent').textContent = Math.round(randomVariation * 100) + '%';
        }

        // Show notification
        function showNotification(message, type) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification ${type}`;
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // Event listeners
        document.getElementById('delaysEnabled').addEventListener('change', async (e) => {
            isEnabled = e.target.checked;
            try {
                const response = await fetch('/api/delays/' + (isEnabled ? 'enable' : 'disable'), {
                    method: 'POST'
                });
                const data = await response.json();
                if (data.success) {
                    updateStatus();
                    showNotification(isEnabled ? 'Delays enabled' : 'Delays disabled', 'success');
                }
            } catch (error) {
                showNotification('Failed to toggle delays', 'error');
            }
        });

        document.getElementById('randomVariation').addEventListener('input', async (e) => {
            randomVariation = parseFloat(e.target.value);
            document.getElementById('variationValue').textContent = Math.round(randomVariation * 100) + '%';
            
            try {
                const response = await fetch('/api/delays/configure', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ randomVariation })
                });
                
                if (response.ok) {
                    updateStatus();
                }
            } catch (error) {
                console.error('Failed to update variation:', error);
            }
        });

        // Initialize on load
        document.addEventListener('DOMContentLoaded', initializePanel);
    </script>
</body>
</html>
