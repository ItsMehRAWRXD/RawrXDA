#cloud-config
timezone: America/New_York
package_update: true
package_upgrade: true

users:
  - default
  - name: rawr
    groups: [sudo,docker]
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      - ssh-ed25519 AAAA...REPLACE_WITH_YOUR_PUBLIC_KEY...

packages:
  - ufw
  - fail2ban
  - git
  - curl
  - nodejs
  - npm
  - docker.io
runcmd:
  - ufw allow OpenSSH
  - ufw allow 80
  - ufw allow 443
  - ufw --force enable
  - systemctl enable --now docker
  - npm install -g pm2
  - echo "✅ setup complete" | systemd-cat -t cloud-init

