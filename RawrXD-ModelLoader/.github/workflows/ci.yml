name: HexMag Swarm & IDE Build Test

on:
  push:
    branches: [ main, dev ]
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Add MSBuild
        uses: microsoft/setup-msbuild@v1.3

      - name: Build Win32 IDE
        run: .\build.ps1 -Config Release -A x64

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        working-directory: services
        run: pip install -r requirements.txt

      - name: Start HexMag Test Swarm (background on port 8001)
        working-directory: services
        shell: pwsh
        run: |
          Start-Process python hexmag\hexmag_engine.py -ArgumentList "--port 8001" -NoNewWindow
          $timeout = 60
          $port = 8001
          Write-Host "Waiting for HexMag service to start on port $port..."
          $retries = 0
          do {
            Start-Sleep -Seconds 1
            $retries++
            $r = try { (Invoke-WebRequest "http://localhost:$port/health" -TimeoutSec 5 -ErrorAction Stop).StatusCode } catch { 0 }
            if ($retries -gt $timeout) { throw "HexMag service failed to start after $timeout seconds." }
          } while ($r -ne 200)
          Write-Host "HexMag service is ready."

      - name: Smoke-test /ask and /agent endpoints
        working-directory: services
        shell: pwsh
        run: python test_smoke.py

      - name: Kill test swarm
        if: always()
        shell: pwsh
        run: taskkill /F /IM python.exe
