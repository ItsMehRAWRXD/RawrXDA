version: "3.8"

# RawrXD Universal Access — Single compose for all deployment modes.
# Usage:
#   docker-compose up -d                      # Backend + Web (HTTP)
#   docker-compose --profile ssl up -d        # Backend + Web (HTTPS)
#   docker-compose --profile desktop up -d    # Backend + Web + noVNC IDE
#   docker-compose --profile soak up -d       # Backend + Web + soak test runner

services:
  rawrxd-backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: rawrxd-backend
    ports:
      - "${RAWRXD_BIND:-0.0.0.0}:23959:23959"
    volumes:
      - rawrxd-models:/opt/rawrxd/models:ro
      - rawrxd-workspace:/workspace
    environment:
      - RAWRXD_HOST=0.0.0.0
      - RAWRXD_PORT=23959
      - RAWRXD_MODEL_PATH=/opt/rawrxd/models
      - RAWRXD_REQUIRE_AUTH=${RAWRXD_REQUIRE_AUTH:-0}
      - RAWRXD_API_KEYS=${RAWRXD_API_KEYS:-}
      - RAWRXD_CORS_ORIGINS=${RAWRXD_CORS_ORIGINS:-*}
      - RAWRXD_MODELS=${RAWRXD_MODELS:-rawrxd-local,rawrxd-plan,rawrxd-full}
      - RAWRXD_DEFAULT_MODEL=${RAWRXD_DEFAULT_MODEL:-rawrxd-local}
    networks:
      - rawrxd-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:23959/status')"]
      interval: 15s
      timeout: 5s
      retries: 3

  rawrxd-web:
    image: nginx:alpine
    container_name: rawrxd-web
    ports:
      - "${RAWRXD_WEB_PORT:-80}:80"
    volumes:
      - ./web_interface:/usr/share/nginx/html:ro
      - ./docker/nginx-http-only.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      rawrxd-backend:
        condition: service_healthy
    networks:
      - rawrxd-net
    restart: unless-stopped

  # HTTPS variant (activate with --profile ssl)
  rawrxd-web-ssl:
    image: nginx:alpine
    container_name: rawrxd-web-ssl
    ports:
      - "443:443"
      - "${RAWRXD_WEB_PORT:-80}:80"
    volumes:
      - ./web_interface:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      rawrxd-backend:
        condition: service_healthy
    networks:
      - rawrxd-net
    restart: unless-stopped
    profiles:
      - ssl

  # Full IDE via browser / noVNC (activate with --profile desktop)
  rawrxd-desktop:
    build:
      context: .
      dockerfile: docker/Dockerfile.full
    container_name: rawrxd-desktop
    ports:
      - "8080:8080"
      - "23960:23959"
    volumes:
      - rawrxd-models:/opt/rawrxd/models:ro
    environment:
      - VNC_PASSWORD=${VNC_PASSWORD:-rawrxd}
    profiles:
      - desktop
    networks:
      - rawrxd-net

  # Soak test runner (activate with --profile soak)
  rawrxd-soak:
    image: python:3.12-slim
    container_name: rawrxd-soak
    depends_on:
      rawrxd-backend:
        condition: service_healthy
    environment:
      - RAWRXD_SOAK_URL=http://rawrxd-backend:23959
      - RAWRXD_SOAK_HOURS=${RAWRXD_SOAK_HOURS:-1}
      - RAWRXD_SOAK_INTERVAL=${RAWRXD_SOAK_INTERVAL:-30}
      - DOCKER=1
    volumes:
      - ./scripts:/scripts:ro
      - ./data:/data
    command: python3 /scripts/soak_test.py
    profiles:
      - soak
    networks:
      - rawrxd-net

volumes:
  rawrxd-models:
  rawrxd-workspace:

networks:
  rawrxd-net:
    driver: bridge
