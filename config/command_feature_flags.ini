# Runtime command feature flags
# Parsed by unified_command_dispatch.cpp at startup.
#
# Keys:
#   disable_incomplete=1|0
#   telemetry=1|0
#   disable_command=<canonical>
#   enable_command=<canonical>
#   disable_category=<Category>
#   incomplete_command=<canonical>

# Disable commands currently classified as incomplete by default.
disable_incomplete=0

# Track command usage telemetry by default.
telemetry=1

