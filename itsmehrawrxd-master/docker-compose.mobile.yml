version: '3.8'

services:
  mobile-android-dev:
    build:
      context: .
      dockerfile: Dockerfile.android
    container_name: mobile-android-dev
    ports:
      - "8080:8080"
      - "8081:8081"
      - "8082:8082"
      - "8083:8083"
      - "8084:8084"
      - "5555:5555"
      - "5556:5556"
    volumes:
      - .:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - ANDROID_HOME=/opt/android-sdk
      - PATH=$PATH:/opt/android-sdk/tools:/opt/android-sdk/platform-tools
    networks:
      - mobile-network

  mobile-ios-dev:
    build:
      context: .
      dockerfile: Dockerfile.ios
    container_name: mobile-ios-dev
    ports:
      - "8085:8080"
      - "8086:8081"
      - "8087:8082"
      - "8088:8083"
      - "8089:8084"
    volumes:
      - .:/workspace
    environment:
      - PATH=$PATH:/opt/flutter/bin
    networks:
      - mobile-network

  mobile-flutter-dev:
    build:
      context: .
      dockerfile: Dockerfile.flutter
    container_name: mobile-flutter-dev
    ports:
      - "8090:8080"
      - "8091:8081"
      - "8092:8082"
      - "8093:8083"
      - "8094:8084"
      - "8095:5555"
    volumes:
      - .:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - ANDROID_HOME=/opt/android-sdk
      - PATH=$PATH:/opt/android-sdk/tools:/opt/android-sdk/platform-tools:/opt/flutter/bin
    networks:
      - mobile-network

  bluestacks-integration:
    image: bluestacks-integration:latest
    container_name: bluestacks-integration
    ports:
      - "5555:5555"
    volumes:
      - .:/workspace
    networks:
      - mobile-network

networks:
  mobile-network:
    driver: bridge
