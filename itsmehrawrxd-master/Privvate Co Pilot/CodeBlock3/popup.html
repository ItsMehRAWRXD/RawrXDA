<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OhGees AI Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 350px;
            min-height: 400px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        
        .header h1 {
            font-size: 18px;
            margin-bottom: 5px;
        }
        
        .header p {
            font-size: 12px;
            opacity: 0.8;
        }
        
        .content {
            padding: 20px;
        }
        
        .section {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            backdrop-filter: blur(10px);
        }
        
        .section h3 {
            font-size: 14px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .input-group {
            margin-bottom: 10px;
        }
        
        .input-group label {
            display: block;
            font-size: 12px;
            margin-bottom: 5px;
            opacity: 0.9;
        }
        
        .input-group input, .input-group select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 12px;
        }
        
        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        
        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.15);
        }
        
        .btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
            width: 100%;
            margin-bottom: 8px;
        }
        
        .btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.4);
        }
        
        .btn.primary {
            background: #007acc;
            border-color: #007acc;
        }
        
        .btn.primary:hover {
            background: #005a9e;
            border-color: #005a9e;
        }
        
        .status {
            font-size: 11px;
            padding: 5px 8px;
            border-radius: 4px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .status.success {
            background: rgba(76, 175, 80, 0.3);
            border: 1px solid rgba(76, 175, 80, 0.5);
        }
        
        .status.error {
            background: rgba(244, 67, 54, 0.3);
            border: 1px solid rgba(244, 67, 54, 0.5);
        }
        
        .status.info {
            background: rgba(33, 150, 243, 0.3);
            border: 1px solid rgba(33, 150, 243, 0.5);
        }
        
        .key-list {
            max-height: 100px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            padding: 8px;
        }
        
        .key-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
            font-size: 11px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .key-item:last-child {
            border-bottom: none;
        }
        
        .key-name {
            font-weight: 500;
        }
        
        .key-status {
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
        }
        
        .key-status.valid {
            background: rgba(76, 175, 80, 0.3);
            color: #4CAF50;
        }
        
        .key-status.invalid {
            background: rgba(244, 67, 54, 0.3);
            color: #f44336;
        }
        
        .footer {
            padding: 15px 20px;
            text-align: center;
            font-size: 11px;
            opacity: 0.7;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .hidden {
            display: none;
        }
        
        .loading {
            opacity: 0.6;
            pointer-events: none;
        }
        
        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 OhGees AI Assistant</h1>
        <p>Enhanced AI-powered coding assistant</p>
    </div>
    
    <div class="content">
        <!-- Status Messages -->
        <div id="status" class="status hidden"></div>
        
        <!-- API Configuration -->
        <div class="section">
            <h3>🔑 API Configuration</h3>
            
            <div class="input-group">
                <label for="provider">AI Provider</label>
                <select id="provider">
                    <option value="openai">OpenAI (GPT)</option>
                    <option value="anthropic">Anthropic (Claude)</option>
                    <option value="local">Local (Ollama)</option>
                </select>
            </div>
            
            <div class="input-group">
                <label for="apiKey">API Key</label>
                <input type="password" id="apiKey" placeholder="Enter your API key">
            </div>
            
            <button id="saveKey" class="btn primary">💾 Save API Key</button>
            <button id="testKey" class="btn">🧪 Test Connection</button>
        </div>
        
        <!-- Current Keys -->
        <div class="section">
            <h3>📋 Current Keys</h3>
            <div id="keyList" class="key-list">
                <div class="key-item">
                    <span class="key-name">Loading...</span>
                    <span class="key-status">-</span>
                </div>
            </div>
            <button id="clearKeys" class="btn">🗑️ Clear All Keys</button>
        </div>
        
        <!-- Quick Actions -->
        <div class="section">
            <h3>⚡ Quick Actions</h3>
            <button id="openOptions" class="btn">⚙️ Settings</button>
            <button id="toggleButton" class="btn">👁️ Toggle AI Button</button>
            <button id="help" class="btn">❓ Help & Shortcuts</button>
        </div>
    </div>
    
    <div class="footer">
        <p>Press Ctrl+Shift+A to activate</p>
        <p>Version 2.0.0</p>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
