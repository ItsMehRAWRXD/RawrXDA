# Docker Compose Override for Development
# This file is automatically loaded by docker-compose for development overrides

version: '3.8'

services:
  rawrz-app:
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
    volumes:
      # Mount source code for development
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
      - "3001:3001"
      - "3002:3002"
      - "8080:8080"
    command: ["npm", "run", "dev"]

  rawrz-db:
    environment:
      - POSTGRES_DB=rawrz_security_dev
      - POSTGRES_USER=rawrz_user
      - POSTGRES_PASSWORD=rawrz_dev_password
    ports:
      - "5432:5432"
    volumes:
      - rawrz_dev_db_data:/var/lib/postgresql/data

  rawrz-redis:
    ports:
      - "6379:6379"
    volumes:
      - rawrz_dev_redis_data:/data

volumes:
  rawrz_dev_db_data:
    driver: local
  rawrz_dev_redis_data:
    driver: local
