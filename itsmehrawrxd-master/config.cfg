# Eon Generator Configuration File
# Simplified configuration for the "for dummies" version

GENERATOR_NAME=EonGenerator
VERSION=1.0.0
TARGET_LANGUAGE=Eon

# LLM Configuration
LLM_ADAPTER=Gemini
LLM_MODEL=gemini-pro
LLM_TEMPERATURE=0.7
LLM_MAX_TOKENS=2048

# Output Configuration
OUTPUT_FORMAT=Eon
OUTPUT_STYLE=Modern
INDENTATION=4
LINE_LENGTH=100

# Template Configuration
TEMPLATE_ENGINE=Simple
TEMPLATE_VALIDATION=Basic
TEMPLATE_ESCAPING=Standard

# Code Generation Settings
GENERATE_MODELS=true
GENERATE_FUNCTIONS=true
GENERATE_TESTS=false
GENERATE_DOCUMENTATION=false

# Default Prompts
DEFAULT_PROMPT=Generate a database schema for a social media platform
DEFAULT_ENTITY_PREFIX=social_media_
DEFAULT_FUNCTION_PREFIX=get_

# Error Handling
ERROR_LEVEL=WARNING
CONTINUE_ON_ERROR=true
LOG_LEVEL=INFO

# Performance Settings
MAX_ENTITIES=50
MAX_FIELDS_PER_ENTITY=20
MAX_FUNCTIONS=100
BUFFER_SIZE=65536

# Security Settings
VALIDATE_INPUT=true
SANITIZE_OUTPUT=true
ALLOW_EXTERNAL_CALLS=false
