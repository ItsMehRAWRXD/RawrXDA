# This is an example agent configuration file
# It is used to define custom AI agents within Continue
# Each agent file can be accessed by selecting it from the agent dropdown

# To learn more, see the full config.yaml reference: https://docs.continue.dev/reference

name: Example Agent
version: 1.0.0
schema: v1

# Models define which AI models this agent can use
# https://docs.continue.dev/customization/models
models:
  - name: Amazon Q Developer
    provider: bedrock
    model: amazon.nova-pro-v1:0
    region: us-east-1
  - name: GitHub Copilot
    provider: openai
    model: gpt-4
    apiKey: YOUR_GITHUB_TOKEN_HERE
    apiBase: https://api.githubcopilot.com
  - name: Kimi
    provider: openai
    model: moonshot-v1-8k
    apiKey: YOUR_KIMI_API_KEY_HERE
    apiBase: https://api.moonshot.cn/v1
  - uses: kimi/moonshot-v1-8k
  - name: Gemini Pro
    provider: gemini
    model: gemini-pro
    apiKey: YOUR_GEMINI_API_KEY_HERE
  - name: my gpt-5
    provider: openai
    model: gpt-5
    apiKey: YOUR_OPENAI_API_KEY_HERE
  - uses: ollama/qwen2.5-coder-7b
  - uses: anthropic/claude-4-sonnet
    with:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

# Agent capabilities
capabilities:
  - chat
  - code_generation
  - code_editing
  - file_operations
  - agent_switching

# Allow dynamic agent switching in Amazon Q chat
allowAgentSwitching: true

# MCP Servers the agent can use
# https://docs.continue.dev/customization/mcp-tools
mcpServers:
  - uses: anthropic/memory-mcp
