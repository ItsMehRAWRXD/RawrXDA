<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RawrZ Security Platform - Main Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .header h1 {
            color: #2c3e50;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .header p {
            color: #7f8c8d;
            font-size: 1.2em;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #3498db;
            margin-bottom: 10px;
        }

        .stat-label {
            color: #7f8c8d;
            font-size: 1.1em;
        }

        .engines-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .engine-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border-left: 5px solid #3498db;
        }

        .engine-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        .engine-card.restored {
            border-left-color: #e74c3c;
            background: linear-gradient(135deg, rgba(231, 76, 60, 0.1) 0%, rgba(255, 255, 255, 0.95) 100%);
        }

        .engine-title {
            font-size: 1.4em;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .engine-description {
            color: #7f8c8d;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .engine-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-primary {
            background: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #27ae60;
            color: white;
        }

        .btn-success:hover {
            background: #229954;
            transform: translateY(-2px);
        }

        .btn-warning {
            background: #f39c12;
            color: white;
        }

        .btn-warning:hover {
            background: #e67e22;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }

        .status-online {
            background: #27ae60;
            box-shadow: 0 0 10px rgba(39, 174, 96, 0.5);
        }

        .status-offline {
            background: #e74c3c;
        }

        .status-loading {
            background: #f39c12;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .restored-badge {
            background: #e74c3c;
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: bold;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 15px;
            width: 80%;
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover {
            color: #000;
        }

        .log-output {
            background: #2c3e50;
            color: #ecf0f1;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 40px;
            padding: 20px;
        }

        /* Achievement Badge System */
        .achievement-badge {
            display: inline-block;
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: #333;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: bold;
            margin: 2px;
            box-shadow: 0 2px 4px rgba(255, 215, 0, 0.3);
            animation: badgeGlow 2s ease-in-out infinite alternate;
        }

        .achievement-badge.platinum {
            background: linear-gradient(135deg, #e5e4e2, #f7f7f7);
            color: #333;
            box-shadow: 0 2px 4px rgba(229, 228, 226, 0.3);
        }

        .achievement-badge.gold {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: #333;
            box-shadow: 0 2px 4px rgba(255, 215, 0, 0.3);
        }

        .achievement-badge.silver {
            background: linear-gradient(135deg, #c0c0c0, #e8e8e8);
            color: #333;
            box-shadow: 0 2px 4px rgba(192, 192, 192, 0.3);
        }

        .achievement-badge.bronze {
            background: linear-gradient(135deg, #cd7f32, #daa520);
            color: white;
            box-shadow: 0 2px 4px rgba(205, 127, 50, 0.3);
        }

        .achievement-badge.legendary {
            background: linear-gradient(135deg, #8a2be2, #ff69b4);
            color: white;
            box-shadow: 0 2px 4px rgba(138, 43, 226, 0.3);
            animation: legendaryGlow 1.5s ease-in-out infinite alternate;
        }

        @keyframes badgeGlow {
            from { box-shadow: 0 2px 4px rgba(255, 215, 0, 0.3); }
            to { box-shadow: 0 4px 8px rgba(255, 215, 0, 0.6); }
        }

        @keyframes legendaryGlow {
            from { box-shadow: 0 2px 4px rgba(138, 43, 226, 0.3); }
            to { box-shadow: 0 6px 12px rgba(138, 43, 226, 0.8); }
        }

        .engine-achievements {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 10px;
        }
    </style>
</head>

                updateStats();
                
                const response = await fetch('/api/rawrz-engine/execute', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        engineId: engineId,
                        action: action,
                        params: params
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {

                }
                
            } catch (error) {

            } finally {
                button.textContent = originalText;
                button.disabled = false;
                activeOperations--;
                updateStats();
            }
        }

        // Show engine details
        function showEngineDetails(engineId) {
            const engine = engines.find(e => e.id === engineId);
            if (!engine) return;
            
            const modal = document.getElementById('engineModal');
            const title = document.getElementById('modalTitle');
            const content = document.getElementById('modalContent');
            
            title.textContent = engine.name;
            content.innerHTML = `
                <h3>Description</h3>
                <p>${engine.description}</p>
                
                <h3>Category</h3>
                <p>${engine.category}</p>
                
                <h3>Status</h3>
                <p>Status: <span class="status-indicator status-${engineStatuses[engineId] || 'offline'}"></span> ${engineStatuses[engineId] || 'offline'}</p>
                
                <h3>Available Actions</h3>
                <ul>
                    ${engine.actions.map(action => `<li><strong>${action.name}</strong>: ${action.action}</li>`).join('')}
                </ul>
                
                ${engine.restored ? '<p><strong>Note:</strong> This engine was recently restored from corruption.</p>' : ''}
            `;
            
            modal.style.display = 'block';
        }

        // Show result
        function showResult(engineId, action, data) {
            const modal = document.getElementById('engineModal');
            const title = document.getElementById('modalTitle');
            const content = document.getElementById('modalContent');
            
            title.textContent = `${engineId} - ${action} Result`;
            content.innerHTML = `
                <h3>Operation Successful</h3>
                <div class="log-output">${JSON.stringify(data, null, 2)}</div>
            `;
            
            modal.style.display = 'block';
        }

        // Show error
        function showError(engineId, action, error) {
            const modal = document.getElementById('engineModal');
            const title = document.getElementById('modalTitle');
            const content = document.getElementById('modalContent');
            
            title.textContent = `${engineId} - ${action} Error`;
            content.innerHTML = `
                <h3>Operation Failed</h3>
                <div class="log-output" style="color: #e74c3c;">${error}</div>
            `;
            
            modal.style.display = 'block';
        }

        // Update stats
        function updateStats() {
            document.getElementById('activeOperations').textContent = activeOperations;
        }

        // Close modal
        document.querySelector('.close').onclick = function() {
            document.getElementById('engineModal').style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('engineModal');
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', initializePanel);
    </script>
</body>
</html>
