<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monaco Editor</title>
  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #editor {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>
  <div id="editor"></div>

  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
  <script>
    let editor;
    require.config({ paths: { 'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } });
    require(['vs/editor/editor.main'], function () {
      editor = monaco.editor.create(document.getElementById('editor'), {
        value: `// Welcome to RawrXD\n// File -> Open or double-click a file in the explorer to start.\n`,
        language: 'powershell',
        theme: 'vs-dark',
        automaticLayout: true,
        minimap: { enabled: true },
        wordWrap: 'on'
      });

      // Notify host that editor is ready
      window.chrome.webview.postMessage({ event: 'editorReady' });
    });

    // Functions to be called from PowerShell
    function setText(text) {
      if (editor) {
        editor.setValue(text);
      }
    }

    function getText() {
      if (editor) {
        return editor.getValue();
      }
      return '';
    }

    function setLanguage(lang) {
      if (editor) {
        monaco.editor.setModelLanguage(editor.getModel(), lang);
      }
    }

    function setTheme(theme) {
      if (editor) {
        monaco.editor.setTheme(theme);
      }
    }
  </script>
</body>

</html>
