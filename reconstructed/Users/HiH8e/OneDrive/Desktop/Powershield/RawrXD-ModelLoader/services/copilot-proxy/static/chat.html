<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Copilot Chat Sidebar Demo</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Segoe UI, Arial;
      background: #0f1115;
      color: #e6edf3;
      margin: 0;
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 360px;
      background: #0d1117;
      border-right: 1px solid #30363d;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 12px 16px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      font-weight: 600;
    }

    .chat-history {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      padding: 10px 12px;
      border-radius: 8px;
      max-width: 90%;
    }

    .message.user {
      align-self: flex-end;
      background: #1f6feb;
      color: #fff;
    }

    .message.assistant {
      align-self: flex-start;
      background: #21262d;
      border: 1px solid #30363d;
    }

    .message.system {
      align-self: center;
      background: #1a1f26;
      color: #8b949e;
      font-size: 12px;
      font-style: italic;
    }

    .chat-input {
      padding: 12px;
      border-top: 1px solid #30363d;
      display: flex;
      gap: 8px;
    }

    .chat-input textarea {
      flex: 1;
      background: #0d1117;
      color: #e6edf3;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px;
      resize: none;
      font-family: inherit;
      min-height: 60px;
    }

    .chat-input button {
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      cursor: pointer;
      font-weight: 600;
    }

    .chat-input button:hover {
      background: #2ea043;
    }

    .chat-input button:disabled {
      background: #21262d;
      color: #6e7681;
      cursor: not-allowed;
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .editor-header {
      padding: 12px 16px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      font-weight: 600;
    }

    .editor-area {
      flex: 1;
      padding: 16px;
      overflow: auto;
    }

    textarea.code-editor {
      width: 100%;
      height: 100%;
      background: #0d1117;
      color: #e6edf3;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 12px;
      font-family: Consolas, monospace;
      font-size: 14px;
    }

    .context-info {
      padding: 8px 12px;
      background: #161b22;
      border-top: 1px solid #30363d;
      font-size: 12px;
      color: #8b949e;
    }

    .feedback-actions {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }

    .feedback-btn {
      background: transparent;
      border: 1px solid #30363d;
      color: #8b949e;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
    }

    .feedback-btn:hover {
      background: #21262d;
      color: #e6edf3;
    }

    .feedback-btn.active {
      background: #238636;
      color: #fff;
      border-color: #238636;
    }
  </style>
</head>

<body>
  <div class="sidebar">
    <div class="sidebar-header">Copilot Chat</div>
    <div class="chat-history" id="chatHistory">
      <div class="message system">Chat started. Ask me anything about your code.</div>
    </div>
    <div class="chat-input">
      <textarea id="userInput" placeholder="Ask Copilot..."></textarea>
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <div class="main-content">
    <div class="editor-header">Code Editor</div>
    <div class="editor-area">
      <textarea class="code-editor" id="codeEditor">// Write your code here
function example() {
  console.log('Hello, Copilot!');
}</textarea>
    </div>
    <div class="context-info" id="contextInfo">
      Context: Current file (4 lines)
    </div>
  </div>

  <script>
    const chatHistory = document.getElementById('chatHistory');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const codeEditor = document.getElementById('codeEditor');
    const contextInfo = document.getElementById('contextInfo');

    let messages = [];

    function addMessage(role, content, feedbackEnabled = false) {
      const msg = { role, content, timestamp: new Date().toISOString() };
      messages.push(msg);

      const msgEl = document.createElement('div');
      msgEl.className = `message ${role}`;
      msgEl.textContent = content;

      if (feedbackEnabled && role === 'assistant') {
        const feedbackDiv = document.createElement('div');
        feedbackDiv.className = 'feedback-actions';
        feedbackDiv.innerHTML = `
          <button class="feedback-btn" data-feedback="helpful">👍 Helpful</button>
          <button class="feedback-btn" data-feedback="unhelpful">👎 Not helpful</button>
        `;
        feedbackDiv.addEventListener('click', (e) => {
          if (e.target.classList.contains('feedback-btn')) {
            feedbackDiv.querySelectorAll('.feedback-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            msg.feedback = e.target.dataset.feedback;
            console.log('Feedback recorded:', msg.feedback);
          }
        });
        msgEl.appendChild(feedbackDiv);
      }

      chatHistory.appendChild(msgEl);
      chatHistory.scrollTop = chatHistory.scrollHeight;
      return msgEl;
    }

    function updateContext() {
      const lines = codeEditor.value.split('\n').length;
      const chars = codeEditor.value.length;
      contextInfo.textContent = `Context: Current file (${lines} lines, ${chars} chars)`;
    }

    async function sendMessage() {
      const userMessage = userInput.value.trim();
      if (!userMessage) return;

      userInput.value = '';
      sendBtn.disabled = true;

      addMessage('user', userMessage);

      // Include code context in the request
      const context = codeEditor.value;
      const prompt = `User's code:\n\`\`\`\n${context}\n\`\`\`\n\nUser question: ${userMessage}`;

      try {
        const response = await fetch('/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            upstream: 'http://localhost:11434/api/generate',
            provider: 'ollama',
            model: 'llama3.1:8b-instruct',
            prompt: prompt,
            max_tokens: 512
          })
        });

        if (!response.ok) {
          addMessage('system', 'Error: ' + (await response.text()));
          sendBtn.disabled = false;
          return;
        }

        const assistantMsgEl = addMessage('assistant', '', true);
        let fullResponse = '';

        const reader = response.body.getReader();
        const decoder = new TextDecoder('utf-8');
        let buffer = '';

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const parts = buffer.split(/\n\n/);
          buffer = parts.pop();

          for (const part of parts) {
            if (!part.startsWith('data:')) continue;
            const payload = part.replace(/^data:\s*/, '');
            try {
              const j = JSON.parse(payload);
              if (j.response) {
                fullResponse += j.response;
                assistantMsgEl.childNodes[0].textContent = fullResponse;
                chatHistory.scrollTop = chatHistory.scrollHeight;
              }
            } catch {
              // Ignore non-JSON
            }
          }
        }

        messages[messages.length - 1].content = fullResponse;

      } catch (err) {
        addMessage('system', 'Network error: ' + err.message);
      }

      sendBtn.disabled = false;
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    codeEditor.addEventListener('input', updateContext);
    updateContext();

    // Auto-save chat history to localStorage
    window.addEventListener('beforeunload', () => {
      localStorage.setItem('copilot_chat_history', JSON.stringify(messages));
    });

    // Load chat history on start
    const saved = localStorage.getItem('copilot_chat_history');
    if (saved) {
      try {
        const loaded = JSON.parse(saved);
        loaded.forEach(msg => {
          if (msg.role !== 'system') {
            addMessage(msg.role, msg.content, msg.role === 'assistant');
          }
        });
      } catch {
        // Ignore parse errors
      }
    }
  </script>
</body>

</html>
