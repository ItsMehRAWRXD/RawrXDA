<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Media Player</title>
    <style>
        body { background: #000; color: #fff; font-family: Arial; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #333; color: #fff; border: none; }
        button { padding: 10px 20px; background: #007acc; color: #fff; border: none; cursor: pointer; }
        video { width: 100%; height: 400px; margin: 20px 0; }
        .url-list { margin: 20px 0; }
        .url-item { background: #222; padding: 10px; margin: 5px 0; cursor: pointer; }
        .url-item:hover { background: #333; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Simple Media Player</h1>
        
        <input type="url" id="videoUrl" placeholder="Paste video URL (mp4, mkv, avi, etc.)">
        <button onclick="loadVideo()">Load Video</button>
        
        <div class="url-list">
            <h3>Sample Videos (Click to play):</h3>
            <div class="url-item" onclick="playUrl('https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4')">
                Big Buck Bunny (Sample)
            </div>
            <div class="url-item" onclick="playUrl('https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4')">
                Elephants Dream (Sample)
            </div>
        </div>
        
        <video id="player" controls>
            Your browser doesn't support video playback.
        </video>
        
        <div id="info"></div>
    </div>

    <script>
        function loadVideo() {
            const url = document.getElementById('videoUrl').value;
            if (url) playUrl(url);
        }
        
        function playUrl(url) {
            const player = document.getElementById('player');
            const info = document.getElementById('info');
            
            player.src = url;
            info.innerHTML = `Playing: ${url}`;
            
            player.onerror = () => {
                info.innerHTML = `Error loading: ${url}`;
            };
        }
        
        // Auto-play first sample
        window.onload = () => {
            playUrl('https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4');
        };
    </script>
</body>
</html>
