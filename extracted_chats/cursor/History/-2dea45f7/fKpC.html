
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigDaddyG IDE - Auto-Generated</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/panels.css">
</head>
<body>
    <div class="ide-container">
        <!-- Left Sidebar -->
        <div class="sidebar left-sidebar" id="left-sidebar">
            <div class="sidebar-tabs">
                <button class="tab-btn active" data-panel="explorer">📁</button>
                <button class="tab-btn" data-panel="search">🔍</button>
                <button class="tab-btn" data-panel="git">🌿</button>
                <button class="tab-btn" data-panel="extensions">🧩</button>
            </div>
            <div class="sidebar-content">
                <div class="panel-container" id="panel-container">
                    <!-- Panels will be loaded here -->
                </div>
            </div>
        </div>

        <!-- Main Content Area -->
        <div class="main-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <div class="file-tabs" id="file-tabs">
                    <!-- File tabs will be loaded here -->
                </div>
                <div class="top-bar-actions">
                    <button class="btn-icon" title="Save" onclick="saveCurrentFile()">💾</button>
                    <button class="btn-icon" title="Run" onclick="runCurrentFile()">▶️</button>
                    <button class="btn-icon" title="Settings" onclick="openSettings()">⚙️</button>
                </div>
            </div>

            <!-- Editor Area -->
            <div class="editor-area">
                <div id="monaco-editor" class="monaco-editor"></div>
            </div>

            <!-- Bottom Panel -->
            <div class="bottom-panel" id="bottom-panel">
                <div class="panel-tabs">
                    <button class="panel-tab active" data-panel="terminal">Terminal</button>
                    <button class="panel-tab" data-panel="problems">Problems</button>
                    <button class="panel-tab" data-panel="output">Output</button>
                    <button class="panel-tab" data-panel="debug">Debug</button>
                </div>
                <div class="panel-content">
                    <div id="terminal" class="terminal-panel"></div>
                    <div id="problems" class="problems-panel" style="display: none;"></div>
                    <div id="output" class="output-panel" style="display: none;"></div>
                    <div id="debug" class="debug-panel" style="display: none;"></div>
                </div>
            </div>
        </div>

        <!-- Right Sidebar -->
        <div class="sidebar right-sidebar" id="right-sidebar">
            <div class="sidebar-tabs">
                <button class="tab-btn active" data-panel="ai">🤖</button>
                <button class="tab-btn" data-panel="outline">📋</button>
                <button class="tab-btn" data-panel="properties">⚙️</button>
            </div>
            <div class="sidebar-content">
                <div class="panel-container" id="right-panel-container">
                    <!-- Right panels will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/monaco-editor@latest/min/vs/loader.js"></script>
    <script src="js/main.js"></script>
    <script src="js/panels.js"></script>
    <script src="js/websocket.js"></script>
    
    <!-- Error Logger -->
    <script src="../error-logger.js"></script>
</body>
</html>
