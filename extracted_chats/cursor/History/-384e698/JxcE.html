<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Chameleon IDE - Transparent & Adaptive</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body { 
            font-family: 'JetBrains Mono', 'Fira Code', monospace; 
            background: transparent;
            color: #00ff88;
            height: 100vh;
            overflow: hidden;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        
        .chameleon-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 1000;
        }
        
        .artifact-currency {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff88;
            border-radius: 8px;
            padding: 10px;
            font-size: 12px;
            backdrop-filter: blur(5px);
        }
        
        .artifact-count {
            color: #00ff88;
            font-weight: bold;
            text-shadow: 0 0 10px #00ff88;
        }
        
        .transparent-editor {
            position: absolute;
            top: 60px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 8px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        
        .code-matrix {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            color: #00ff88;
            border: none;
            outline: none;
            padding: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            background: transparent;
            text-shadow: 0 0 5px #00ff88;
        }
        
        .code-matrix::placeholder {
            color: rgba(0, 255, 136, 0.5);
            text-shadow: 0 0 3px rgba(0, 255, 136, 0.3);
        }
        
        .holographic-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: linear-gradient(45deg, 
                transparent 0%, 
                rgba(0, 255, 136, 0.05) 25%, 
                transparent 50%, 
                rgba(0, 255, 136, 0.05) 75%, 
                transparent 100%);
            animation: hologram-scan 3s linear infinite;
        }
        
        @keyframes hologram-scan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        .artifact-generator {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff88;
            border-radius: 8px;
            padding: 15px;
            backdrop-filter: blur(5px);
        }
        
        .compile-btn {
            background: linear-gradient(45deg, rgba(0, 255, 136, 0.2), rgba(0, 255, 136, 0.4));
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            text-shadow: 0 0 5px #00ff88;
            transition: all 0.3s ease;
        }
        
        .compile-btn:hover {
            background: linear-gradient(45deg, rgba(0, 255, 136, 0.4), rgba(0, 255, 136, 0.6));
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }
        
        .artifact-display {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 8px;
            padding: 15px;
            backdrop-filter: blur(10px);
            max-width: 300px;
        }
        
        .artifact-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0;
            border-bottom: 1px solid rgba(0, 255, 136, 0.2);
        }
        
        .artifact-name {
            color: #00ff88;
            font-size: 11px;
        }
        
        .artifact-value {
            color: #00ff88;
            font-weight: bold;
            text-shadow: 0 0 5px #00ff88;
        }
        
        .shader-preview {
            position: absolute;
            top: 50%;
            right: 20px;
            width: 200px;
            height: 150px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 8px;
            backdrop-filter: blur(10px);
            overflow: hidden;
        }
        
        .shader-canvas {
            width: 100%;
            height: 100%;
            background: transparent;
        }
        
        .adaptive-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: 
                radial-gradient(circle at 20% 80%, rgba(0, 255, 136, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(0, 255, 136, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(0, 255, 136, 0.03) 0%, transparent 50%);
            z-index: -1;
            animation: bg-pulse 4s ease-in-out infinite alternate;
        }
        
        @keyframes bg-pulse {
            0% { opacity: 0.3; }
            100% { opacity: 0.7; }
        }
        
        .matrix-rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: -2;
            background: transparent;
        }
        
        .matrix-column {
            position: absolute;
            top: -100px;
            color: rgba(0, 255, 136, 0.1);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            line-height: 1.2;
            animation: matrix-fall linear infinite;
        }
        
        @keyframes matrix-fall {
            0% { transform: translateY(-100vh); opacity: 1; }
            100% { transform: translateY(100vh); opacity: 0; }
        }
    </style>
</head>
<body>
    <!-- Adaptive Background -->
    <div class="adaptive-bg"></div>
    
    <!-- Matrix Rain Effect -->
    <div class="matrix-rain" id="matrix-rain"></div>
    
    <!-- Main Chameleon Container -->
    <div class="chameleon-container">
        <!-- Artifact Currency Display -->
        <div class="artifact-currency">
            <div class="artifact-count">Artifacts: <span id="artifact-count">0</span></div>
            <div style="font-size: 10px; color: rgba(0, 255, 136, 0.7);">OpenGL Artifacts Only</div>
        </div>
        
        <!-- Artifact Display -->
        <div class="artifact-display">
            <h4 style="color: #00ff88; margin-bottom: 10px; text-shadow: 0 0 5px #00ff88;">Artifact Inventory</h4>
            <div class="artifact-item">
                <span class="artifact-name">Vertex Shader</span>
                <span class="artifact-value" id="vertex-artifacts">0</span>
            </div>
            <div class="artifact-item">
                <span class="artifact-name">Fragment Shader</span>
                <span class="artifact-value" id="fragment-artifacts">0</span>
            </div>
            <div class="artifact-item">
                <span class="artifact-name">Compute Shader</span>
                <span class="artifact-value" id="compute-artifacts">0</span>
            </div>
            <div class="artifact-item">
                <span class="artifact-name">Geometry Shader</span>
                <span class="artifact-value" id="geometry-artifacts">0</span>
            </div>
        </div>
        
        <!-- Transparent Editor -->
        <div class="transparent-editor">
            <textarea class="code-matrix" id="code-editor" placeholder="// Chameleon IDE - Transparent & Adaptive
// OpenGL Artifacts as Currency
// See-through rendering system

#version 330 core

// Holographic vertex shader
layout (location = 0) in vec3 aPos;
layout (location = 1) in vec2 aTexCoord;

uniform mat4 model;
uniform mat4 view;
uniform mat4 projection;
uniform float time;

out vec2 TexCoord;
out vec3 WorldPos;
out float HologramIntensity;

void main() {
    // Chameleon adaptation to background
    vec3 displacedPos = aPos + vec3(0.0, 0.0, sin(time + aPos.x) * 0.1);
    
    WorldPos = vec3(model * vec4(displacedPos, 1.0));
    gl_Position = projection * view * vec4(WorldPos, 1.0);
    TexCoord = aTexCoord;
    
    // Hologram intensity based on position
    HologramIntensity = sin(time * 2.0 + length(WorldPos)) * 0.5 + 0.5;
}

// Fragment shader for transparency
#version 330 core

in vec2 TexCoord;
in vec3 WorldPos;
in float HologramIntensity;

uniform sampler2D backgroundTexture;
uniform float time;

out vec4 FragColor;

void main() {
    // Sample background for chameleon effect
    vec4 bgColor = texture(backgroundTexture, TexCoord);
    
    // Holographic overlay
    float hologram = HologramIntensity * sin(time * 3.0 + WorldPos.x * 10.0);
    
    // Transparent chameleon effect
    vec3 chameleonColor = mix(bgColor.rgb, vec3(0.0, 1.0, 0.5), hologram * 0.3);
    
    FragColor = vec4(chameleonColor, 0.8); // Semi-transparent
}">// Chameleon IDE - Transparent & Adaptive
// OpenGL Artifacts as Currency
// See-through rendering system

#version 330 core

// Holographic vertex shader
layout (location = 0) in vec3 aPos;
layout (location = 1) in vec2 aTexCoord;

uniform mat4 model;
uniform mat4 view;
uniform mat4 projection;
uniform float time;

out vec2 TexCoord;
out vec3 WorldPos;
out float HologramIntensity;

void main() {
    // Chameleon adaptation to background
    vec3 displacedPos = aPos + vec3(0.0, 0.0, sin(time + aPos.x) * 0.1);
    
    WorldPos = vec3(model * vec4(displacedPos, 1.0));
    gl_Position = projection * view * vec4(WorldPos, 1.0);
    TexCoord = aTexCoord;
    
    // Hologram intensity based on position
    HologramIntensity = sin(time * 2.0 + length(WorldPos)) * 0.5 + 0.5;
}

// Fragment shader for transparency
#version 330 core

in vec2 TexCoord;
in vec3 WorldPos;
in float HologramIntensity;

uniform sampler2D backgroundTexture;
uniform float time;

out vec4 FragColor;

void main() {
    // Sample background for chameleon effect
    vec4 bgColor = texture(backgroundTexture, TexCoord);
    
    // Holographic overlay
    float hologram = HologramIntensity * sin(time * 3.0 + WorldPos.x * 10.0);
    
    // Transparent chameleon effect
    vec3 chameleonColor = mix(bgColor.rgb, vec3(0.0, 1.0, 0.5), hologram * 0.3);
    
    FragColor = vec4(chameleonColor, 0.8); // Semi-transparent
}</textarea>
            
            <!-- Holographic Overlay -->
            <div class="holographic-overlay"></div>
        </div>
        
        <!-- Shader Preview -->
        <div class="shader-preview">
            <canvas class="shader-canvas" id="shader-canvas" width="200" height="150"></canvas>
        </div>
        
        <!-- Artifact Generator -->
        <div class="artifact-generator">
            <button class="compile-btn" onclick="generateArtifacts()">Generate Artifacts</button>
            <button class="compile-btn" onclick="compileShaders()">Compile Shaders</button>
            <button class="compile-btn" onclick="adaptToBackground()">Adapt to Background</button>
        </div>
    </div>

    <script>
        // Artifact currency system
        let artifacts = {
            vertex: 0,
            fragment: 0,
            compute: 0,
            geometry: 0,
            total: 0
        };
        
        // Matrix rain effect
        function createMatrixRain() {
            const matrixContainer = document.getElementById('matrix-rain');
            const columns = Math.floor(window.innerWidth / 20);
            
            for (let i = 0; i < columns; i++) {
                const column = document.createElement('div');
                column.className = 'matrix-column';
                column.style.left = (i * 20) + 'px';
                column.style.animationDuration = (Math.random() * 3 + 2) + 's';
                column.style.animationDelay = Math.random() * 2 + 's';
                
                // Generate random matrix characters
                let text = '';
                for (let j = 0; j < 20; j++) {
                    text += String.fromCharCode(0x30A0 + Math.random() * 96) + '<br>';
                }
                column.innerHTML = text;
                
                matrixContainer.appendChild(column);
            }
        }
        
        // Generate OpenGL artifacts
        function generateArtifacts() {
            const code = document.getElementById('code-editor').value;
            
            // Count shader types
            const vertexCount = (code.match(/#version.*core/g) || []).length;
            const fragmentCount = (code.match(/out vec4 FragColor/g) || []).length;
            const computeCount = (code.match(/layout.*local_size/g) || []).length;
            const geometryCount = (code.match(/layout.*triangles/g) || []).length;
            
            // Generate artifacts based on shader complexity
            artifacts.vertex += vertexCount * 10;
            artifacts.fragment += fragmentCount * 15;
            artifacts.compute += computeCount * 25;
            artifacts.geometry += geometryCount * 20;
            artifacts.total = artifacts.vertex + artifacts.fragment + artifacts.compute + artifacts.geometry;
            
            updateArtifactDisplay();
            
            // Visual feedback
            document.getElementById('artifact-count').style.textShadow = '0 0 20px #00ff88';
            setTimeout(() => {
                document.getElementById('artifact-count').style.textShadow = '0 0 5px #00ff88';
            }, 1000);
        }
        
        // Compile shaders
        function compileShaders() {
            const code = document.getElementById('code-editor').value;
            
            // Simulate shader compilation
            console.log('Compiling shaders...');
            
            // Generate compilation artifacts
            if (code.includes('vertex') || code.includes('Vertex')) {
                artifacts.vertex += 5;
            }
            if (code.includes('fragment') || code.includes('Fragment')) {
                artifacts.fragment += 5;
            }
            if (code.includes('compute') || code.includes('Compute')) {
                artifacts.compute += 5;
            }
            if (code.includes('geometry') || code.includes('Geometry')) {
                artifacts.geometry += 5;
            }
            
            artifacts.total = artifacts.vertex + artifacts.fragment + artifacts.compute + artifacts.geometry;
            updateArtifactDisplay();
            
            // Visual compilation effect
            document.body.style.background = 'rgba(0, 255, 136, 0.1)';
            setTimeout(() => {
                document.body.style.background = 'transparent';
            }, 500);
        }
        
        // Adapt to background
        function adaptToBackground() {
            // Simulate background adaptation
            const colors = [
                'rgba(0, 255, 136, 0.1)',
                'rgba(255, 0, 136, 0.1)',
                'rgba(136, 0, 255, 0.1)',
                'rgba(255, 136, 0, 0.1)'
            ];
            
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            document.querySelector('.chameleon-container').style.borderColor = randomColor;
            document.querySelector('.chameleon-container').style.background = randomColor;
            
            // Generate adaptation artifacts
            artifacts.total += 3;
            updateArtifactDisplay();
        }
        
        // Update artifact display
        function updateArtifactDisplay() {
            document.getElementById('artifact-count').textContent = artifacts.total;
            document.getElementById('vertex-artifacts').textContent = artifacts.vertex;
            document.getElementById('fragment-artifacts').textContent = artifacts.fragment;
            document.getElementById('compute-artifacts').textContent = artifacts.compute;
            document.getElementById('geometry-artifacts').textContent = artifacts.geometry;
        }
        
        // Shader canvas rendering
        function renderShaderPreview() {
            const canvas = document.getElementById('shader-canvas');
            const ctx = canvas.getContext('2d');
            
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Create holographic effect
            const time = Date.now() * 0.001;
            
            for (let x = 0; x < canvas.width; x += 2) {
                for (let y = 0; y < canvas.height; y += 2) {
                    const intensity = Math.sin(x * 0.1 + time) * Math.cos(y * 0.1 + time);
                    const alpha = Math.abs(intensity) * 0.3;
                    
                    ctx.fillStyle = `rgba(0, 255, 136, ${alpha})`;
                    ctx.fillRect(x, y, 2, 2);
                }
            }
            
            requestAnimationFrame(renderShaderPreview);
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            createMatrixRain();
            renderShaderPreview();
            
            // Auto-generate artifacts on code change
            document.getElementById('code-editor').addEventListener('input', function() {
                setTimeout(() => {
                    generateArtifacts();
                }, 1000);
            });
        });
        
        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                compileShaders();
            }
            if (e.ctrlKey && e.key === 'g') {
                generateArtifacts();
            }
            if (e.ctrlKey && e.key === 'a') {
                adaptToBackground();
            }
        });
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('compile-btn')?.addEventListener('click', () => alert('Compile clicked'));
            document.getElementById('send-btn')?.addEventListener('click', () => alert('Send clicked'));
        });
    </script>
</body>
</html>
