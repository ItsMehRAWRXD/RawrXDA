[server]
port=11441
host=0.0.0.0
cors_enabled=true

[models]
; Scan C:/ drive for models
scan_c_drive=true

; Scan D:/ drive for models
scan_d_drive=true

; How deep to scan directories (1-10)
scan_depth=5

; Minimum file size in MB to consider (filters out tiny .bin files)
min_file_size_mb=0.1

; Cache duration in minutes before re-scanning
cache_duration_minutes=60

[bigdaddyg]
; Model type: 'trained' or 'algorithmic'
