; Training data size (lines of code)
training_lines=200000

; Specializations
specialization=assembly,security,encryption,reverse-engineering,exploit-development

; Context window size
context_window=1000000

[ollama]
; Enable Ollama integration
enabled=true

; Ollama port
port=11434

; Fallback to BigDaddyG trained model if Ollama offline
fallback_to_trained=true

