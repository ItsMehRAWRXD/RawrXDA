<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BigDaddyG Agentic Copilot</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 350px;
      height: 500px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1e1e1e;
      color: #d4d4d4;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: linear-gradient(135deg, #00ff00, #00aa00);
      padding: 20px;
      text-align: center;
      color: #000;
    }

    .header h1 {
      font-size: 20px;
      margin-bottom: 5px;
    }

    .header p {
      font-size: 12px;
      opacity: 0.8;
    }

    .content {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    .section {
      background: #2d2d30;
      border: 1px solid #3e3e42;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
    }

    .section h3 {
      color: #00ff00;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .stat {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #3e3e42;
      font-size: 12px;
    }

    .stat:last-child {
      border-bottom: none;
    }

    .stat-value {
      color: #00ff00;
      font-weight: bold;
    }

    button {
      width: 100%;
      background: #00ff00;
      color: #000;
      border: none;
      padding: 12px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 10px;
    }

    button:hover {
      background: #00aa00;
    }

    button.secondary {
      background: #2d2d30;
      color: #00ff00;
      border: 1px solid #00ff00;
    }

    button.secondary:hover {
      background: #3e3e42;
    }

    .agent-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .agent {
      background: #3e3e42;
      padding: 10px;
      border-radius: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
    }

    .agent-name {
      font-weight: bold;
      color: #00ff00;
    }

    .agent-stats {
      font-size: 10px;
      color: #888;
    }

    .footer {
      background: #2d2d30;
      padding: 15px;
      text-align: center;
      font-size: 11px;
      color: #888;
      border-top: 1px solid #3e3e42;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #1e1e1e;
    }

    ::-webkit-scrollbar-thumb {
      background: #00ff00;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🚀 BigDaddyG Copilot</h1>
    <p>Agentic AI Assistant</p>
  </div>

  <div class="content">
    <div class="section">
      <h3>Quick Actions</h3>
      <button id="activateCopilot">Activate Copilot on Page</button>
      <button id="viewStats" class="secondary">View Agent Statistics</button>
      <button id="clearHistory" class="secondary">Clear History</button>
    </div>

    <div class="section">
      <h3>Agent Status</h3>
      <div class="agent-list" id="agentList">
        <div class="agent">
          <span class="agent-name">Loading...</span>
        </div>
      </div>
    </div>

    <div class="section">
      <h3>System Info</h3>
      <div class="stat">
        <span>Version</span>
        <span class="stat-value">1.0.0</span>
      </div>
      <div class="stat">
        <span>Total Agents</span>
        <span class="stat-value" id="totalAgents">6</span>
      </div>
      <div class="stat">
        <span>Total Executions</span>
        <span class="stat-value" id="totalExecutions">0</span>
      </div>
      <div class="stat">
        <span>Avg Latency</span>
        <span class="stat-value" id="avgLatency">0ms</span>
      </div>
    </div>
  </div>

  <div class="footer">
    BigDaddyG Agentic Copilot v1.0.0<br>
    Zero Dependencies · Full Power
  </div>

  <script src="popup.js"></script>
</body>
</html>
