#include <iostream>
#include <string>
#include <vector>
#include <map>

// Token types
enum TokenType {
    IDENTIFIER, NUMBER, KEYWORD, OPERATOR, LPAREN, RPAREN, 
    LBRACE, RBRACE, SEMICOLON, END_OF_FILE
};

// Token structure
struct Token {
    TokenType type;
    std::string value;
    int line;
};

// Lexer class
class Lexer {
private:
    std::string source;
    size_t pos;
    int line;
    
    bool isAlpha(char c) { return (c >= 'a' && c <= 'z') || (c >= 'A' && c <= 'Z') || c == '_'; }
    bool isDigit(char c) { return c >= '0' && c <= '9'; }
    bool isAlphaNum(char c) { return isAlpha(c) || isDigit(c); }
    
public:
    Lexer(const std::string& src) : source(src), pos(0), line(1) {}
    
    Token nextToken() {
        // Skip whitespace
        while (pos < source.length() && isspace(source[pos])) {
            if (source[pos] == '\\n') line++;
            pos++;
        }
        
        if (pos >= source.length()) {
            return {END_OF_FILE, "", line};
        }
        
        char current = source[pos];
        
        // Numbers
        if (isDigit(current)) {
            std::string num;
            while (pos < source.length() && isDigit(source[pos])) {
                num += source[pos++];
            }
            return {NUMBER, num, line};
        }
        
        // Identifiers and keywords
        if (isAlpha(current)) {
            std::string id;
            while (pos < source.length() && isAlphaNum(source[pos])) {
                id += source[pos++];
            }
            
            // Check for keywords
            std::vector<std::string> keywords = {"if", "else", "while", "return", "int", "void", "class"};
            for (const auto& kw : keywords) {
                if (id == kw) return {KEYWORD, id, line};
            }
            
            return {IDENTIFIER, id, line};
        }
        
        // Single-character tokens
        pos++;
        switch (current) {
            case '(': return {LPAREN, "(", line};
            case ')': return {RPAREN, ")", line};
            case '{': return {LBRACE, "{", line};
            case '}': return {RBRACE, "}", line};
            case ';': return {SEMICOLON, ";", line};
            case '+': case '-': case '*': case '/': case '=':
                return {OPERATOR, std::string(1, current), line};
            default:
                return {OPERATOR, std::string(1, current), line};
        }
    }
};

// AST Node types
struct ASTNode {
    virtual ~ASTNode() = default;
    virtual void print(int indent = 0) const = 0;
};

struct NumberNode : public ASTNode {
    int value;
    NumberNode(int v) : value(v) {}
    void print(int indent = 0) const override {
        std::cout << std::string(indent, ' ') << "Number: " << value << std::endl;
    }
};

struct IdentifierNode : public ASTNode {
    std::string name;
    IdentifierNode(const std::string& n) : name(n) {}
    void print(int indent = 0) const override {
        std::cout << std::string(indent, ' ') << "Identifier: " << name << std::endl;
    }
};

// Parser class
class Parser {
private:
    Lexer& lexer;
    Token currentToken;
    
    void advance() {
        currentToken = lexer.nextToken();
    }
    
    void expect(TokenType type) {
        if (currentToken.type != type) {
            throw std::runtime_error("Unexpected token at line " + std::to_string(currentToken.line));
        }
        advance();
    }
    
public:
    Parser(Lexer& lex) : lexer(lex) {
        advance(); // Initialize first token
    }
    
    std::unique_ptr<ASTNode> parseExpression() {
        if (currentToken.type == NUMBER) {
            int val = std::stoi(currentToken.value);
            advance();
            return std::make_unique<NumberNode>(val);
        }
        
        if (currentToken.type == IDENTIFIER) {
            std::string name = currentToken.value;
            advance();
            return std::make_unique<IdentifierNode>(name);
        }
        
        throw std::runtime_error("Expected expression");
    }
    
    void parse() {
        while (currentToken.type != END_OF_FILE) {
            auto expr = parseExpression();
            expr->print();
            
            if (currentToken.type == SEMICOLON) {
                advance();
            }
        }
    }
};

// Example usage
int main() {
    std::string code = "x = 42; y = 100;";
    
    Lexer lexer(code);
    Parser parser(lexer);
    
    try {
        parser.parse();
        std::cout << "Parsing successful!" << std::endl;
    } catch (const std::exception& e) {
        std::cerr << "Parse error: " << e.what() << std::endl;
    }
    
    return 0;
}
