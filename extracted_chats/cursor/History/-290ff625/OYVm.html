<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>🎬 4K Multi-Stream Viewer – 200" Project</title>
    <style>
        :root {
            --bg: #000;
            --accent: #0f0;
            --text: #fff;
            --border: #333;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        .multi-stream-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            height: 100vh;
            gap: 2px;
        }
        .stream-panel {
            background: var(--bg);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }
        .stream-panel.active { border: 2px solid var(--accent); }
        .stream-iframe {
            width: 100%; height: 100%; border: none;
        }
        .stream-controls {
            position: absolute;
            top: 10px; left: 10px; right: 10px;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,.8); padding: 10px; border-radius: 5px; z-index: 10;
        }
        .stream-title { font-size: 14px; font-weight: bold; color: var(--accent); }
        .stream-buttons { display: flex; gap: 10px; }
        .control-btn {
            background: var(--accent); border: none; color: var(--bg);
            padding: 5px 10px; border-radius: 3px; cursor: pointer; font-size: 12px;
        }
        .control-btn:hover { background: #0c0; }
        .subtitle-overlay {
            position: absolute; bottom: 20px; left: 20px; right: 20px;
            background: rgba(0,0,0,.8); color: var(--accent);
            padding: 10px; border-radius: 5px; font-size: 16px; text-align: center; z-index: 5;
        }
        .global-controls {
            position: fixed; top: 20px; right: 20px;
            background: rgba(0,0,0,.9); padding: 20px; border-radius: 10px;
            border: 1px solid var(--border); z-index: 100;
        }
        .global-controls h3 { color: var(--accent); margin-bottom: 15px; }
        .control-group { margin-bottom: 15px; }
        .control-group label { display: block; margin-bottom: 5px; font-size: 12px; }
        .control-group input, .control-group select {
            width: 100%; padding: 8px; background: var(--bg); border: 1px solid var(--border);
            color: var(--text); border-radius: 3px;
        }
        .preset-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .preset-btn {
            background: var(--border); border: 1px solid var(--accent); color: var(--text);
            padding: 8px; border-radius: 3px; cursor: pointer; font-size: 11px;
        }
        .preset-btn:hover { background: var(--accent); color: var(--bg); }
        .fullscreen-btn {
            position: fixed; bottom: 20px; right: 20px; background: var(--accent);
            border: none; color: var(--bg); padding: 15px 20px; border-radius: 50px;
            cursor: pointer; font-size: 16px; font-weight: bold; z-index: 100;
        }
        .fullscreen-btn:hover { background: #0c0; }
        .stream-info {
            position: absolute; top: 50px; left: 10px;
            background: rgba(0,0,0,.8); padding: 5px 10px; border-radius: 3px;
            font-size: 11px; color: var(--accent);
        }
        .quality-indicator {
            position: absolute; top: 10px; right: 10px;
            background: rgba(0,255,0,.8); color: var(--bg);
            padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="multi-stream-container">
        <!-- Twitch Panel -->
        <div class="stream-panel" id="twitchPanel">
            <div class="stream-controls">
                <div class="stream-title">🎮 Twitch</div>
                <div class="stream-buttons">
                    <button class="control-btn" onclick="toggleMute('twitch')">🔇</button>
                    <button class="control-btn" onclick="toggleFullscreen('twitch')">⛶</button>
                    <button class="control-btn" onclick="changeQuality('twitch')">HD</button>
                </div>
            </div>
            <iframe class="stream-iframe" id="twitchStream" src="about:blank"></iframe>
            <div class="subtitle-overlay" id="twitchSubtitles">Twitch subtitles will appear here</div>
            <div class="stream-info">Status: Ready</div>
            <div class="quality-indicator">4K</div>
        </div>

        <!-- YouTube Panel -->
        <div class="stream-panel" id="youtubePanel">
            <div class="stream-controls">
                <div class="stream-title">📺 YouTube</div>
                <div class="stream-buttons">
                    <button class="control-btn" onclick="toggleMute('youtube')">🔇</button>
                    <button class="control-btn" onclick="toggleFullscreen('youtube')">⛶</button>
                    <button class="control-btn" onclick="changeQuality('youtube')">HD</button>
                </div>
            </div>
            <iframe class="stream-iframe" id="youtubeStream" src="about:blank"></iframe>
            <div class="subtitle-overlay" id="youtubeSubtitles">YouTube subtitles will appear here</div>
            <div class="stream-info">Status: Ready</div>
            <div class="quality-indicator">4K</div>
        </div>

        <!-- Kick Panel -->
        <div class="stream-panel" id="kickPanel">
            <div class="stream-controls">
                <div class="stream-title">🥊 Kick</div>
                <div class="stream-buttons">
                    <button class="control-btn" onclick="toggleMute('kick')">🔇</button>
                    <button class="control-btn" onclick="toggleFullscreen('kick')">⛶</button>
                    <button class="control-btn" onclick="changeQuality('kick')">HD</button>
                </div>
            </div>
            <iframe class="stream-iframe" id="kickStream" src="about:blank"></iframe>
            <div class="subtitle-overlay" id="kickSubtitles">Kick subtitles will appear here</div>
            <div class="stream-info">Status: Ready</div>
            <div class="quality-indicator">4K</div>
        </div>

        <!-- Custom Panel -->
        <div class="stream-panel" id="customPanel">
            <div class="stream-controls">
                <div class="stream-title">🎯 Custom</div>
                <div class="stream-buttons">
                    <button class="control-btn" onclick="toggleMute('custom')">🔇</button>
                    <button class="control-btn" onclick="toggleFullscreen('custom')">⛶</button>
                    <button class="control-btn" onclick="changeQuality('custom')">HD</button>
                </div>
            </div>
            <iframe class="stream-iframe" id="customStream" src="about:blank"></iframe>
            <div class="subtitle-overlay" id="customSubtitles">Custom stream subtitles will appear here</div>
            <div class="stream-info">Status: Ready</div>
            <div class="quality-indicator">4K</div>
        </div>
    </div>

    <div class="global-controls">
        <h3>🎮 Stream Controls</h3>
        
        <div class="control-group">
            <label>Presets:</label>
            <div class="preset-buttons">
                <button class="preset-btn" onclick="loadPreset('gaming')">Gaming</button>
                <button class="preset-btn" onclick="loadPreset('news')">News</button>
                <button class="preset-btn" onclick="loadPreset('sports')">Sports</button>
                <button class="preset-btn" onclick="loadPreset('music')">Music</button>
            </div>
        </div>

        <div class="control-group">
            <label>Twitch Channel:</label>
            <input type="text" id="twitchChannel" placeholder="xqc" value="xqc">
        </div>

        <div class="control-group">
            <label>YouTube URL:</label>
            <input type="text" id="youtubeUrl" placeholder="https://youtube.com/watch?v=..." value="https://www.youtube.com/watch?v=dQw4w9WgXcQ">
        </div>

        <div class="control-group">
            <label>Kick Channel:</label>
            <input type="text" id="kickChannel" placeholder="xqc" value="xqc">
        </div>

        <div class="control-group">
            <label>Custom URL:</label>
            <input type="text" id="customUrl" placeholder="https://..." value="">
        </div>

        <div class="control-group">
            <label>Subtitle Language:</label>
            <select id="subtitleLanguage">
                <option value="en">English</option>
                <option value="es">Spanish</option>
                <option value="fr">French</option>
                <option value="de">German</option>
                <option value="auto">Auto</option>
            </select>
        </div>

        <button class="control-btn" onclick="loadAllStreams()" style="width: 100%; margin-top: 10px;">🚀 Load All Streams</button>
        <button class="control-btn" onclick="loadWorkingStreams()" style="width: 100%; margin-top: 5px; background: #00ff00; color: #000;">✅ Load Working Streams</button>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreenMode()">⛶ Fullscreen</button>

    <script>
        class MultiStreamController {
            constructor() {
                this.streams = {
                    twitch: { muted: false, quality: '4K', active: false },
                    youtube: { muted: false, quality: '4K', active: false },
                    kick: { muted: false, quality: '4K', active: false },
                    custom: { muted: false, quality: '4K', active: false }
                };
                
                this.subtitleEnabled = true;
                this.currentPreset = 'gaming';
                this.initializePresets();
            }

            initializePresets() {
                this.presets = {
                    gaming: {
                        twitch: 'xqc',
                        youtube: 'https://www.youtube.com/watch?v=dQw4w9WgXcQ',
                        kick: 'xqc',
                        custom: ''
                    },
                    news: {
                        twitch: 'cnn',
                        youtube: 'https://www.youtube.com/watch?v=9bZkp7q19f0',
                        kick: 'cnn',
                        custom: ''
                    },
                    sports: {
                        twitch: 'espn',
                        youtube: 'https://www.youtube.com/watch?v=jNQXAC9IVRw',
                        kick: 'espn',
                        custom: ''
                    },
                    music: {
                        twitch: 'monstercat',
                        youtube: 'https://www.youtube.com/watch?v=9bZkp7q19f0',
                        kick: 'monstercat',
                        custom: ''
                    }
                };
            }

            loadStream(platform, source) {
                const iframe = document.getElementById(`${platform}Stream`);
                const panel = document.getElementById(`${platform}Panel`);
                
                if (!source) {
                    iframe.src = 'about:blank';
                    panel.querySelector('.stream-info').textContent = 'Status: No source';
                    return;
                }

                let url = '';
                if (platform === 'twitch') {
                    url = `https://player.twitch.tv/?channel=${source}&parent=${window.location.hostname}&autoplay=true&muted=false`;
                } else if (platform === 'youtube') {
                    const vid = new URLSearchParams(new URL(source).search).get('v') || source;
                    url = `https://www.youtube.com/embed/${vid}?autoplay=1&mute=0`;
                } else if (platform === 'kick') {
                    url = `https://kick.com/embed/${source}`;
                } else {
                    url = source;
                }
                
                iframe.src = url;
                panel.querySelector('.stream-info').textContent = 'Status: Loaded';
                this.streams[platform].active = true;
            }

            loadPreset(presetName) {
                if (this.presets[presetName]) {
                    const preset = this.presets[presetName];
                    document.getElementById('twitchChannel').value = preset.twitch;
                    document.getElementById('youtubeUrl').value = preset.youtube;
                    document.getElementById('kickChannel').value = preset.kick;
                    document.getElementById('customUrl').value = preset.custom;
                    this.currentPreset = presetName;
                    
                    // Update preset button states
                    document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.remove('active'));
                    event.target.classList.add('active');
                }
            }

            loadAllStreams() {
                this.loadStream('twitch', document.getElementById('twitchChannel').value);
                this.loadStream('youtube', document.getElementById('youtubeUrl').value);
                this.loadStream('kick', document.getElementById('kickChannel').value);
                this.loadStream('custom', document.getElementById('customUrl').value);
            }

            loadWorkingStreams() {
                // Load known working streams
                this.loadStream('twitch', 'xqc');
                this.loadStream('youtube', 'https://www.youtube.com/watch?v=dQw4w9WgXcQ');
                this.loadStream('kick', 'xqc');
                this.loadStream('custom', 'https://www.twitch.tv/ninja');
            }

            toggleMute(platform) {
                this.streams[platform].muted = !this.streams[platform].muted;
                const button = event.target;
                button.textContent = this.streams[platform].muted ? '🔊' : '🔇';
            }

            changeQuality(platform) {
                const qualities = ['HD', 'FHD', '4K'];
                const currentIndex = qualities.indexOf(this.streams[platform].quality);
                const nextIndex = (currentIndex + 1) % qualities.length;
                this.streams[platform].quality = qualities[nextIndex];
                
                const button = event.target;
                button.textContent = this.streams[platform].quality;
                
                const indicator = document.querySelector(`#${platform}Panel .quality-indicator`);
                indicator.textContent = this.streams[platform].quality;
            }

            loadSubtitles(platform, source) {
                if (!this.subtitleEnabled) return;
                
                const subtitleElement = document.getElementById(`${platform}Subtitles`);
                const subtitles = [
                    `Welcome to ${platform.toUpperCase()}!`,
                    `Now playing: ${source}`,
                    `Quality: ${this.streams[platform].quality}`,
                    `Live from ${platform.toUpperCase()}`,
                    `Enjoying the stream!`
                ];
                
                let index = 0;
                const interval = setInterval(() => {
                    subtitleElement.textContent = subtitles[index];
                    index = (index + 1) % subtitles.length;
                }, 3000);
                
                // Store interval ID for cleanup
                this.subtitleIntervals = this.subtitleIntervals || {};
                this.subtitleIntervals[platform] = interval;
            }
        }

        // Initialize the controller
        const controller = new MultiStreamController();
        
        // Load default gaming preset
        controller.loadPreset('gaming');

        // Global functions
        function toggleMute(platform) {
            controller.toggleMute(platform);
        }

        function changeQuality(platform) {
            controller.changeQuality(platform);
        }

        function toggleFullscreen(platform) {
            document.getElementById(`${platform}Panel`).requestFullscreen();
        }

        function loadPreset(name) {
            controller.loadPreset(name);
        }

        function loadAllStreams() {
            controller.loadAllStreams();
        }

        function loadWorkingStreams() {
            controller.loadWorkingStreams();
        }

        function toggleFullscreenMode() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        console.log('🎬 Multi-Stream 4K Viewer loaded for 200" projector!');
    </script>
</body>
</html>
