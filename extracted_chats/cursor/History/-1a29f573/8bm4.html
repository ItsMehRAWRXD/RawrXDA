<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>BigDaddyG Ultimate IDE</title>
<link rel="stylesheet" href="style.css" />
<script type="module" src="main.js"></script>
</head>
<body>
<div id="layout">
    <header id="topbar">
        <div id="menu-bar"></div>
        <div id="tool-bar"></div>
    </header>
    <main id="workspace">
        <div id="sidebar"></div>
        <div id="center-stack">
            <div id="tabs"></div>
            <div id="editor-split">
                <div id="editor"></div>
                <div id="webgl-panel">
                    <canvas id="webgl-canvas"></canvas>
                    <textarea id="shader-editor"></textarea>
                    <div id="webgl-inspector"></div>
                </div>
            </div>
        </div>
        <div id="panel">
            <div class="panel-tabs">
                <button data-target="terminal" class="panel-tab active">Terminal</button>
                <button data-target="agent" class="panel-tab">Agent</button>
                <button data-target="security" class="panel-tab">Security</button>
                <button data-target="compiler" class="panel-tab">Compiler</button>
            </div>
            <div id="terminal" class="panel-view active"></div>
            <div id="agent" class="panel-view"></div>
            <div id="security" class="panel-view"></div>
            <div id="compiler" class="panel-view"></div>
        </div>
    </main>
    <footer id="statusbar">
        <div id="status-left"></div>
        <div id="status-right"></div>
    </footer>
</div>
<div id="command-palette" class="hidden">
    <input id="command-input" type="text" placeholder="Type a command or search…" />
    <ul id="command-list"></ul>
</div>
</body>
</html>
</body>
</html>
