<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d1117">
    <link rel="manifest" href="manifest.json">
    <title>RawrXD Agentic IDE - Web</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --border: #30363d;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --success: #238636;
            --warning: #f0883e;
            --error: #f85149;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }
        .container { display: flex; height: 100vh; }
        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        .logo {
            padding: 16px;
            font-size: 18px;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-item {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.2s;
            user-select: none;
        }
        .nav-item:hover, .nav-item.active { background: var(--bg-tertiary); }
        .nav-item svg { width: 16px; height: 16px; fill: currentColor; }
        .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .header {
            height: 48px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            gap: 16px;
        }
        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
        }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--error); }
        .status-dot.connected { background: var(--success); }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            line-height: 1.6;
            font-size: 14px;
            word-wrap: break-word;
            overflow-wrap: anywhere;
        }
        .message.user {
            align-self: flex-end;
            background: var(--accent);
            color: #ffffff;
            border-color: var(--accent);
        }
        .message.assistant {
            align-self: flex-start;
            background: var(--bg-secondary);
        }
        .message.system {
            align-self: center;
            background: var(--bg-tertiary);
            font-size: 12px;
            color: var(--text-secondary);
            border-style: dashed;
        }
        .input-container {
            padding: 16px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
        }
        .input-wrapper {
            display: flex;
            gap: 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            align-items: flex-end;
        }
        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: inherit;
            font-family: inherit;
            font-size: 14px;
            resize: none;
            outline: none;
            min-height: 24px;
            max-height: 200px;
        }
        button {
            background: var(--accent);
            color: #ffffff;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }
        button:hover { background: var(--accent-hover); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .toolbar {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .tool-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            padding: 4px 12px;
            font-size: 12px;
            color: var(--text-secondary);
        }
        .tool-btn:hover { background: var(--border); color: var(--text-primary); }
        .tool-btn.active {
            color: #ffffff;
            border-color: var(--accent);
            background: color-mix(in srgb, var(--accent) 40%, var(--bg-tertiary));
        }
        .model-selector {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }
        .model-selector span {
            color: var(--text-secondary);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        select {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: inherit;
            padding: 4px 8px;
            border-radius: 6px;
            outline: none;
            max-width: 320px;
        }
        .streaming-cursor { display: inline-block; animation: blink 1s infinite; }
        @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
        .code-block {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 12px;
            margin: 8px 0;
            font-family: "SFMono-Regular", Consolas, monospace;
            font-size: 12px;
            overflow-x: auto;
            position: relative;
        }
        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 11px;
            text-transform: uppercase;
        }
        .copy-btn {
            padding: 4px 8px;
            font-size: 11px;
            background: var(--bg-tertiary);
        }
        .code-block pre {
            margin: 0;
            white-space: pre-wrap;
        }
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
            margin-bottom: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .settings-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .settings-modal.active { display: flex; }
        .settings-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            width: 500px;
            max-width: 100%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .settings-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .settings-body { padding: 16px; }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-secondary);
        }
        .form-group input {
            width: 100%;
            padding: 8px 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: inherit;
            border-radius: 6px;
        }
        .mode-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .mode-tab {
            flex: 1;
            padding: 8px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            text-align: center;
            cursor: pointer;
            font-size: 12px;
            user-select: none;
        }
        .mode-tab.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #ffffff;
        }
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .message { max-width: 95%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">RawrXD Web</div>
            <div class="nav-item active" onclick="switchTab('chat', event)">
                <svg viewBox="0 0 16 16"><path d="M8 0a8 8 0 1 0 0 16A8 8 0 0 0 8 0ZM1 8a7 7 0 1 1 14 0A7 7 0 0 1 1 8Z"/></svg>
                Chat
            </div>
            <div class="nav-item" onclick="switchTab('agent', event)">
                <svg viewBox="0 0 16 16"><path d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0ZM4.5 7.5a.5.5 0 0 0 0 1h5.793l-2.147 2.146a.5.5 0 0 0 .707.708l3-3a.5.5 0 0 0 0-.708l-3-3a.5.5 0 1 0-.707.707L10.293 7.5H4.5Z"/></svg>
                Agent
            </div>
            <div class="nav-item" onclick="switchTab('tools', event)">
                <svg viewBox="0 0 16 16"><path d="M4.5 0A2.5 2.5 0 0 0 2 2.5v11A2.5 2.5 0 0 0 4.5 16h7a2.5 2.5 0 0 0 2.5-2.5v-11A2.5 2.5 0 0 0 11.5 0h-7ZM4 2.5a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 .5.5V4H4V2.5ZM4 5h8v1H4V5Zm0 2h8v1H4V7Zm0 2h8v1H4V9Zm0 2h8v1H4v-1Z"/></svg>
                Tools
            </div>
            <div class="nav-item" onclick="toggleSettings()">
                <svg viewBox="0 0 16 16"><path d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492ZM5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0Z"/><path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.893 3.434-.902 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.893-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52l-.094-.319Z"/></svg>
                Settings
            </div>
        </aside>

        <main class="main">
            <header class="header">
                <div class="model-selector">
                    <span>Model:</span>
                    <select id="modelSelect" onchange="changeModel(this.value)">
                        <option value="">Loading...</option>
                    </select>
                </div>
                <div class="connection-status">
                    <div class="status-dot" id="statusDot"></div>
                    <span id="statusText">Disconnected</span>
                </div>
            </header>

            <div class="chat-container" id="chatContainer">
                <div class="message system">
                    Welcome to RawrXD Web. Connect to your RawrEngine backend to begin.
                </div>
            </div>

            <div class="input-container">
                <div class="toolbar">
                    <button class="tool-btn" onclick="insertContext('@file')">@File</button>
                    <button class="tool-btn" onclick="insertContext('@code')">@Code</button>
                    <button class="tool-btn" onclick="insertContext('@terminal')">@Terminal</button>
                    <button class="tool-btn" onclick="toolListFiles()">Files</button>
                    <button class="tool-btn" onclick="toolReadFile()">Read</button>
                    <button class="tool-btn" onclick="toolWriteFile()">Write</button>
                    <button class="tool-btn" onclick="toolSearch()">Search</button>
                    <button class="tool-btn" onclick="toolRunCommand()">Run</button>
                    <button class="tool-btn active" data-mode="ask" onclick="setMode('ask', this)">Ask</button>
                    <button class="tool-btn" data-mode="plan" onclick="setMode('plan', this)">Plan</button>
                    <button class="tool-btn" data-mode="full" onclick="setMode('full', this)">Full</button>
                </div>
                <div class="input-wrapper">
                    <textarea id="userInput" placeholder="Message RawrXD Agent..." rows="1" onkeydown="handleKeydown(event)"></textarea>
                    <div class="spinner" id="spinner"></div>
                    <button onclick="sendMessage()" id="sendBtn">Send</button>
                </div>
            </div>
        </main>
    </div>

    <div class="settings-modal" id="settingsModal">
        <div class="settings-content">
            <div class="settings-header">
                <h3>Connection Settings</h3>
                <button onclick="toggleSettings()">X</button>
            </div>
            <div class="settings-body">
                <div class="form-group">
                    <label>RawrEngine URL</label>
                    <input type="text" id="apiUrl" value="http://localhost:23959" placeholder="http://localhost:23959">
                </div>
                <div class="form-group">
                    <label>API Key (optional)</label>
                    <input type="password" id="apiKey" placeholder="Enter API key">
                </div>
                <div class="form-group">
                    <label>Agent Mode</label>
                    <div class="mode-tabs">
                        <div class="mode-tab active" data-mode="ask" onclick="setAgentMode('ask', this)">Ask</div>
                        <div class="mode-tab" data-mode="plan" onclick="setAgentMode('plan', this)">Plan</div>
                        <div class="mode-tab" data-mode="full" onclick="setAgentMode('full', this)">Full</div>
                    </div>
                </div>
                <button onclick="saveSettings()" style="width: 100%;">Connect</button>
            </div>
        </div>
    </div>

    <script>
        // RawrXD Web Interface - Universal Access Client
        // Zero dependencies, vanilla JS, connects to RawrEngine HTTP API.

        const DEFAULT_API_URL = "http://localhost:23959";

        function isValidApiUrl(value) {
            if (!value) {
                return false;
            }
            try {
                const parsed = new URL(value);
                return parsed.protocol === "http:" || parsed.protocol === "https:";
            } catch {
                return false;
            }
        }

        function getQueryOverride() {
            const params = new URLSearchParams(window.location.search);
            const api = params.get("api");
            const key = params.get("key");
            return {
                apiUrl: isValidApiUrl(api) ? api : "",
                apiKey: key || ""
            };
        }

        const queryOverride = getQueryOverride();

        const state = {
            apiUrl: queryOverride.apiUrl || localStorage.getItem("rawrxd_api_url") || DEFAULT_API_URL,
            apiKey: queryOverride.apiKey || localStorage.getItem("rawrxd_api_key") || "",
            currentModel: localStorage.getItem("rawrxd_model") || "",
            agentMode: localStorage.getItem("rawrxd_mode") || "ask",
            isStreaming: false,
            conversation: [],
            tools: [],
            connected: false
        };

        const textarea = document.getElementById("userInput");
        textarea.addEventListener("input", function () {
            this.style.height = "auto";
            this.style.height = Math.min(this.scrollHeight, 200) + "px";
        });

        function getHeaders(extra = {}) {
            return {
                ...(state.apiKey ? { "X-API-Key": state.apiKey } : {}),
                ...extra
            };
        }

        function withTimeout(ms, promise) {
            return Promise.race([
                promise,
                new Promise((_, reject) => setTimeout(() => reject(new Error("Request timed out")), ms))
            ]);
        }

        function safeJson(response) {
            return response.text().then((text) => {
                if (!text) {
                    return {};
                }
                try {
                    return JSON.parse(text);
                } catch {
                    return { raw: text };
                }
            });
        }

        async function apiRequest(path, options = {}) {
            const method = options.method || "GET";
            const headers = getHeaders(options.body ? { "Content-Type": "application/json" } : {});
            const response = await withTimeout(
                options.timeoutMs || 20000,
                fetch(`${state.apiUrl}${path}`, {
                    method,
                    headers,
                    body: options.body ? JSON.stringify(options.body) : undefined
                })
            );

            const parsed = await safeJson(response);
            if (!response.ok) {
                throw new Error(parsed.error || `${method} ${path} failed (${response.status})`);
            }
            return parsed;
        }

        function extensionToLang(path) {
            const ext = path.split(".").pop()?.toLowerCase() || "";
            const map = {
                js: "javascript",
                ts: "typescript",
                jsx: "javascript",
                tsx: "typescript",
                py: "python",
                cpp: "cpp",
                cc: "cpp",
                c: "c",
                h: "c",
                hpp: "cpp",
                cs: "csharp",
                go: "go",
                rs: "rust",
                java: "java",
                json: "json",
                md: "markdown",
                yml: "yaml",
                yaml: "yaml",
                sh: "bash",
                ps1: "powershell",
                sql: "sql",
                html: "html",
                css: "css"
            };
            return map[ext] || "text";
        }

        function handleKeydown(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        async function checkConnection() {
            const statusDot = document.getElementById("statusDot");
            const statusText = document.getElementById("statusText");
            try {
                const response = await withTimeout(5000, fetch(`${state.apiUrl}/status`, {
                    method: "GET",
                    headers: getHeaders()
                }));
                if (!response.ok) {
                    throw new Error(`Status HTTP ${response.status}`);
                }

                statusDot.classList.add("connected");
                statusText.textContent = "Connected";

                if (!state.connected) {
                    await Promise.allSettled([loadModels(), loadTools()]);
                    addMessage("Connected to RawrEngine backend.", "system");
                }
                state.connected = true;
                return true;
            } catch (error) {
                statusDot.classList.remove("connected");
                statusText.textContent = "Disconnected";
                state.connected = false;
                return false;
            }
        }

        async function loadModels() {
            try {
                const response = await fetch(`${state.apiUrl}/v1/models`, {
                    headers: getHeaders()
                });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const data = await safeJson(response);
                const select = document.getElementById("modelSelect");
                const models = Array.isArray(data.models) ? data.models : [];

                select.innerHTML = "";

                if (!models.length) {
                    const opt = document.createElement("option");
                    opt.value = "";
                    opt.textContent = "No models available";
                    select.appendChild(opt);
                    return;
                }

                models.forEach((model) => {
                    const id = model.id || model.name || String(model);
                    const option = document.createElement("option");
                    option.value = id;
                    option.textContent = id;
                    option.selected = id === state.currentModel;
                    select.appendChild(option);
                });

                if (!state.currentModel) {
                    state.currentModel = models[0].id || models[0].name || String(models[0]);
                    localStorage.setItem("rawrxd_model", state.currentModel);
                }
                select.value = state.currentModel;
            } catch (error) {
                console.error("Failed to load models:", error);
                const select = document.getElementById("modelSelect");
                select.innerHTML = "<option value=\"\">Model load failed</option>";
            }
        }

        async function loadTools() {
            try {
                const response = await fetch(`${state.apiUrl}/api/tools`, {
                    headers: getHeaders()
                });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const data = await safeJson(response);
                state.tools = Array.isArray(data.tools) ? data.tools : [];
            } catch {
                state.tools = [];
            }
        }

        async function changeModel(model) {
            state.currentModel = model;
            localStorage.setItem("rawrxd_model", model);
            try {
                await fetch(`${state.apiUrl}/api/agentic/config`, {
                    method: "POST",
                    headers: getHeaders({ "Content-Type": "application/json" }),
                    body: JSON.stringify({ model })
                });
            } catch (error) {
                addMessage(`Failed to update model: ${error.message}`, "system");
            }
        }

        async function sendMessage() {
            const input = document.getElementById("userInput");
            const message = input.value.trim();
            if (!message || state.isStreaming) {
                return;
            }

            input.value = "";
            input.style.height = "auto";

            addMessage(message, "user");
            state.conversation.push({ role: "user", content: message });

            document.getElementById("spinner").style.display = "block";
            document.getElementById("sendBtn").disabled = true;
            state.isStreaming = true;

            try {
                if (state.agentMode === "plan") {
                    await handlePlanMode(message);
                } else if (state.agentMode === "full") {
                    await handleFullAgent(message);
                } else {
                    await handleChat();
                }
            } catch (error) {
                addMessage(`Error: ${error.message}`, "system");
            } finally {
                state.isStreaming = false;
                document.getElementById("spinner").style.display = "none";
                document.getElementById("sendBtn").disabled = false;
            }
        }

        async function handleChat() {
            const response = await fetch(`${state.apiUrl}/api/chat`, {
                method: "POST",
                headers: getHeaders({ "Content-Type": "application/json" }),
                body: JSON.stringify({
                    model: state.currentModel,
                    messages: state.conversation,
                    stream: true
                })
            });

            if (!response.ok) {
                const body = await safeJson(response);
                throw new Error(body.error || `Chat request failed (${response.status})`);
            }
            if (!response.body) {
                throw new Error("Streaming response body unavailable");
            }

            const msgDiv = addMessage("", "assistant");
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let sseBuffer = "";
            let content = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) {
                    break;
                }

                sseBuffer += decoder.decode(value, { stream: true });

                let newlineIndex = sseBuffer.indexOf("\n");
                while (newlineIndex !== -1) {
                    const line = sseBuffer.slice(0, newlineIndex).trim();
                    sseBuffer = sseBuffer.slice(newlineIndex + 1);

                    if (line.startsWith("data:")) {
                        const payload = line.slice(5).trim();
                        if (!payload || payload === "[DONE]") {
                            newlineIndex = sseBuffer.indexOf("\n");
                            continue;
                        }
                        try {
                            const data = JSON.parse(payload);
                            const delta = data.choices?.[0]?.delta?.content;
                            if (typeof delta === "string") {
                                content += delta;
                                msgDiv.innerHTML = `${formatContent(content)}<span class="streaming-cursor">▊</span>`;
                                scrollToBottom();
                            }
                        } catch (error) {
                            console.error("Failed to parse SSE payload:", error);
                        }
                    }
                    newlineIndex = sseBuffer.indexOf("\n");
                }
            }

            state.conversation.push({ role: "assistant", content });
            msgDiv.innerHTML = formatContent(content || "(No content returned)");
        }

        async function handlePlanMode(message) {
            const response = await fetch(`${state.apiUrl}/api/agent/wish`, {
                method: "POST",
                headers: getHeaders({ "Content-Type": "application/json" }),
                body: JSON.stringify({
                    wish: message,
                    mode: "plan",
                    model: state.currentModel
                })
            });
            if (!response.ok) {
                const body = await safeJson(response);
                throw new Error(body.error || `Plan request failed (${response.status})`);
            }
            const data = await safeJson(response);
            if (Array.isArray(data.plan) && data.plan.length) {
                addMessage(`**Plan:**\n${data.plan.map((step, i) => `${i + 1}. ${step}`).join("\n")}`, "assistant");
                if (data.requires_confirmation) {
                    addMessage("Type \"execute\" to run this plan.", "system");
                }
                return;
            }
            addMessage(data.response || "No plan returned.", "assistant");
        }

        async function handleFullAgent(message) {
            const response = await fetch(`${state.apiUrl}/api/agent/wish`, {
                method: "POST",
                headers: getHeaders({ "Content-Type": "application/json" }),
                body: JSON.stringify({
                    wish: message,
                    mode: "full",
                    model: state.currentModel,
                    auto_execute: true
                })
            });
            if (!response.ok) {
                const body = await safeJson(response);
                throw new Error(body.error || `Full agent request failed (${response.status})`);
            }
            const data = await safeJson(response);
            if (data.response) {
                addMessage(data.response, "assistant");
            } else {
                addMessage("Agent completed without textual output.", "assistant");
            }
            if (Array.isArray(data.tool_calls)) {
                data.tool_calls.forEach((call) => {
                    addMessage(`Executing: ${call.tool}(${JSON.stringify(call.params || {})})`, "system");
                });
            }
        }

        function addMessage(content, role) {
            const container = document.getElementById("chatContainer");
            const div = document.createElement("div");
            div.className = `message ${role}`;
            div.innerHTML = formatContent(content);
            container.appendChild(div);
            scrollToBottom();
            return div;
        }

        function formatContent(text) {
            const raw = typeof text === "string" ? text : String(text ?? "");
            const codeBlocks = [];

            let withTokens = raw.replace(/```(\w+)?\n([\s\S]*?)```/g, (_match, lang, code) => {
                const token = `@@CODEBLOCK_${codeBlocks.length}@@`;
                codeBlocks.push({ token, lang: lang || "text", code: code.trimEnd() });
                return token;
            });

            withTokens = escapeHtml(withTokens);
            withTokens = withTokens.replace(/`([^`\n]+)`/g, "<code style=\"background: var(--bg-tertiary); padding: 2px 6px; border-radius: 3px; font-family: monospace;\">$1</code>");
            withTokens = withTokens.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
            withTokens = withTokens.replace(/^\s*[-*]\s+(.+)$/gm, "• $1");
            withTokens = withTokens.replace(/\n/g, "<br>");

            codeBlocks.forEach((block) => {
                const rendered = `<div class="code-block">
                    <div class="code-header">
                        <span>${escapeHtml(block.lang)}</span>
                        <button class="copy-btn" onclick="copyCode(this)">Copy</button>
                    </div>
                    <pre>${escapeHtml(block.code)}</pre>
                </div>`;
                withTokens = withTokens.replace(escapeHtml(block.token), rendered);
            });

            return withTokens;
        }

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        async function copyCode(btn) {
            const code = btn.closest(".code-block").querySelector("pre").textContent;
            try {
                await navigator.clipboard.writeText(code);
                btn.textContent = "Copied!";
            } catch {
                btn.textContent = "Copy failed";
            }
            setTimeout(() => {
                btn.textContent = "Copy";
            }, 2000);
        }

        function scrollToBottom() {
            const container = document.getElementById("chatContainer");
            container.scrollTop = container.scrollHeight;
        }

        function insertContext(type) {
            const input = document.getElementById("userInput");
            const spacer = input.value && !input.value.endsWith(" ") ? " " : "";
            input.value += `${spacer}${type} `;
            input.dispatchEvent(new Event("input"));
            input.focus();
        }

        async function toolListFiles() {
            const path = prompt("Workspace path to list", ".");
            if (path === null) return;
            try {
                const data = await apiRequest(`/api/fs/list?path=${encodeURIComponent(path)}&depth=2`);
                const preview = (data.items || [])
                    .slice(0, 120)
                    .map((item) => `${item.type === "dir" ? "[D]" : "[F]"} ${item.path}`)
                    .join("\n");
                addMessage(
                    `**Workspace** \`${data.root || path}\` (${data.count || 0} items)\n\`\`\`text\n${preview || "(empty)"}\n\`\`\`${data.truncated ? "\n_Truncated output_" : ""}`,
                    "assistant"
                );
            } catch (error) {
                addMessage(`List files failed: ${error.message}`, "system");
            }
        }

        async function toolReadFile() {
            const path = prompt("File path to read", "");
            if (!path) return;
            try {
                const data = await apiRequest("/api/fs/read", {
                    method: "POST",
                    body: { path }
                });
                const lang = extensionToLang(data.path || path);
                addMessage(
                    `**Read** \`${data.path || path}\` (${data.size_bytes || 0} bytes)\n\`\`\`${lang}\n${data.content || ""}\n\`\`\`${data.truncated ? "\n_Truncated output_" : ""}`,
                    "assistant"
                );
            } catch (error) {
                addMessage(`Read file failed: ${error.message}`, "system");
            }
        }

        async function toolWriteFile() {
            const path = prompt("File path to write", "");
            if (!path) return;

            const draft = document.getElementById("userInput").value;
            let content = draft;
            if (!content) {
                content = prompt("File content (single-line prompt). Tip: paste multi-line into message box first.", "");
                if (content === null) return;
            }

            try {
                const data = await apiRequest("/api/fs/write", {
                    method: "POST",
                    body: { path, content }
                });
                addMessage(`Wrote \`${data.path}\` (${data.size_bytes} bytes)`, "system");
            } catch (error) {
                addMessage(`Write file failed: ${error.message}`, "system");
            }
        }

        async function toolSearch() {
            const query = prompt("Search query", "");
            if (!query) return;
            const path = prompt("Search path", ".") || ".";
            try {
                const data = await apiRequest("/api/search", {
                    method: "POST",
                    body: { query, path, regex: false, case_sensitive: false, max_results: 120 }
                });
                const preview = (data.results || [])
                    .slice(0, 120)
                    .map((hit) => `${hit.path}:${hit.line}:${hit.column}  ${hit.preview}`)
                    .join("\n");
                addMessage(
                    `**Search** \`${query}\` in \`${data.root || path}\` (${data.count || 0} hits)\n\`\`\`text\n${preview || "(no matches)"}\n\`\`\`${data.truncated ? "\n_Truncated results_" : ""}`,
                    "assistant"
                );
            } catch (error) {
                addMessage(`Search failed: ${error.message}`, "system");
            }
        }

        async function toolRunCommand() {
            const command = prompt("Shell command to run", "");
            if (!command) return;
            const cwd = prompt("Working directory (relative to workspace)", ".") || ".";
            try {
                const data = await apiRequest("/api/terminal/exec", {
                    method: "POST",
                    body: { command, cwd, timeout_s: 30 }
                });
                const output = [
                    `exit=${data.exit_code} duration=${data.duration_ms}ms cwd=${data.cwd}`,
                    "",
                    data.stdout || "",
                    data.stderr ? `\n[stderr]\n${data.stderr}` : ""
                ].join("\n");
                addMessage(`**Command:** \`${command}\`\n\`\`\`text\n${output.trim()}\n\`\`\``, "assistant");
            } catch (error) {
                addMessage(`Command failed: ${error.message}`, "system");
            }
        }

        function setMode(mode, triggerElement) {
            state.agentMode = mode;
            localStorage.setItem("rawrxd_mode", mode);
            document.querySelectorAll(".tool-btn[data-mode]").forEach((button) => {
                button.classList.toggle("active", button.dataset.mode === mode);
            });
            if (triggerElement) {
                triggerElement.blur();
            }
            setAgentMode(mode, document.querySelector(`.mode-tab[data-mode="${mode}"]`));
            addMessage(`Switched to ${mode.toUpperCase()} mode`, "system");
        }

        function toggleSettings() {
            document.getElementById("settingsModal").classList.toggle("active");
        }

        async function saveSettings() {
            state.apiUrl = document.getElementById("apiUrl").value.trim() || DEFAULT_API_URL;
            state.apiKey = document.getElementById("apiKey").value.trim();

            localStorage.setItem("rawrxd_api_url", state.apiUrl);
            localStorage.setItem("rawrxd_api_key", state.apiKey);

            toggleSettings();
            const ok = await checkConnection();
            if (!ok) {
                addMessage("Unable to connect with the current settings.", "system");
            }
        }

        function switchTab(tab, evt) {
            document.querySelectorAll(".nav-item").forEach((el) => el.classList.remove("active"));
            evt.currentTarget.classList.add("active");
            if (tab === "tools") {
                addMessage("Tools tab active: use Files/Read/Write/Search/Run controls.", "system");
                return;
            }
            if (tab === "agent") {
                addMessage(`Agent tab active in ${state.agentMode.toUpperCase()} mode`, "system");
                return;
            }
            addMessage("Chat tab active", "system");
        }

        function setAgentMode(mode, element) {
            state.agentMode = mode;
            localStorage.setItem("rawrxd_mode", mode);
            document.querySelectorAll(".mode-tab").forEach((tab) => tab.classList.remove("active"));
            if (element) {
                element.classList.add("active");
            }
        }

        function initialize() {
            if (queryOverride.apiUrl) {
                localStorage.setItem("rawrxd_api_url", queryOverride.apiUrl);
            }
            if (queryOverride.apiKey) {
                localStorage.setItem("rawrxd_api_key", queryOverride.apiKey);
            }

            document.getElementById("apiUrl").value = state.apiUrl;
            document.getElementById("apiKey").value = state.apiKey;
            document.querySelectorAll(".mode-tab").forEach((tab) => {
                tab.classList.toggle("active", tab.dataset.mode === state.agentMode);
            });
            document.querySelectorAll(".tool-btn[data-mode]").forEach((button) => {
                button.classList.toggle("active", button.dataset.mode === state.agentMode);
            });

            setInterval(checkConnection, 5000);
            checkConnection();

            // PWA Service Worker
            const isSecureContext = location.protocol === "https:" || location.hostname === "localhost" || location.hostname === "127.0.0.1";
            if ("serviceWorker" in navigator && isSecureContext) {
                navigator.serviceWorker.register("./sw.js").catch((error) => {
                    console.warn("Service worker registration failed:", error);
                });
            }
        }

        initialize();
    </script>
</body>
</html>
