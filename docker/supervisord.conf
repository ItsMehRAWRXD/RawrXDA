[supervisord]
nodaemon=true
user=root

[program:xvfb]
command=Xvfb :1 -screen 0 1920x1080x24
autorestart=true

[program:x11vnc]
command=x11vnc -display :1 -nopw -forever -shared
autorestart=true

[program:novnc]
command=websockify --web=/usr/share/novnc --cert=none --ssl-only=false 8080 localhost:5901
autorestart=true

[program:fluxbox]
command=fluxbox
autorestart=true
environment=DISPLAY=:1

[program:rawrxd-backend]
command=python3 /opt/rawrxd/backend/RawrEngine.py
autorestart=true
directory=/opt/rawrxd/backend
environment=RAWRXD_HOST="0.0.0.0",RAWRXD_PORT="23959",PYTHONPATH="/opt/rawrxd/backend"

[program:rawrxd-ide]
command=wine /opt/rawrxd/RawrXD-Win32IDE.exe
autorestart=false
environment=DISPLAY=:1,DISPLAY=:1
priority=10
; Skip if exe missing: use startsecs=0 and exit gracefully
startsecs=5
